body:
  text: 蜀鑑卷九宋郭允蹈撰西南夷本末上西南夷在蜀徼外非細故也漢武帝始置郡縣叛服不常屢見於史今從通鑑繫年書之武都氐羌至楊氏而始大其後遂為階成興鳯等州為蜀之藩籬已别見不著於此漢武帝元光四年拜唐蒙為中郎將使通南夷始置犍為郡初建元六年王恢之討東越也使番陽令唐蒙風曉南越南越食蒙以蜀枸醬蒙問所從來曰道西北牂牁江牂牁江廣數里出番禺城下蒙歸至長安問蜀賈人賈人曰獨蜀出枸醬多持竊出市夜郎夜郎者臨牂牁江江廣百餘步足以行船南越以財物役屬之然亦不能臣使也蒙乃上書曰南越王名為外臣實一州主也今以長沙豫章水道多絶竊聞夜郎精兵可十餘萬浮船牂牁出其不意此制越一竒也請通夜郎道為置吏上乃拜蒙為中郎將將千人從笮關入見夜郎侯多同厚賜之諭以威德約為置吏多同等貪漢繒帛以為道險漢終不能有乃且聼約蒙還報上以為犍為郡華陽國志曰昔楚威王遣莊蹻泝沅水出且蘭以伐夜郎植牂牁繫船於是且蘭既克夜郎又降而秦奪楚黔中地無路得反遂留王滇池因名且蘭為牂牁國注牂牁繫船􅍻也後漢注牂牁江中名山也笮關在沉黎郡又云犍為郡治鄨元光五年又治南廣水經注云鄨水出符縣南不狼山縣有犍山後漢志注鄨水過牂牁郡入延江水水經注云東徑沅水出且蘭東徑辰陽南又徑沅陵縣西寰宇記云唐播州夷州費州莊州即秦夜郎苴蘭縣之西北隅今珍州亦其地又西髙州有夜郎縣牂州建安縣有古夜郎郡城西近施黔東近辰沅皆其境也鄨縣水出符縣今瀘州合江縣即符地南廣今敘州南溪縣亦其地鄨與南廣皆在都江之南也司馬相如為中郎將通西夷置都唐蒙發卒治道數萬人自僰道詣牂牁江士卒多物故有逃亡者用軍法誅之巴蜀民大驚上使司馬相如責蒙等因諭告巴蜀民以非上意相如還報時邛笮君長聞南夷得賞賜多欲請吏上問相如相如曰邛笮冉駹近蜀易通為置郡縣愈於南夷上乃拜相如為中郎將建節往使因巴蜀吏幣物以賂西夷皆請為內臣除邊關關益斥西至沫若水南至牂牁為徼通靈關道橋孫水以通邛都為置一都尉十餘縣屬蜀天子大悅靈關道漢地理志屬越嶲郡寰宇記靈關山在雅州盧山縣北二十里峯嶺嵯峨靈關鎮在盧山縣北八十二里四向險峻控帶藩蠻一夫守之可以禦百蜀都賦云廓靈關而為門邛徠山本名邛笮即邛人笮人之交邛徠關在雅州榮經縣孫水本名長河水又曰沙水出嶲州臺登縣繩水出徼外若水南至大笮入繩元朔三年罷西夷置南夷夜郎兩縣一都尉稍令犍為自保就注令自保守且修其城郭元狩元年慱望侯張騫使西域始通滇國復事西南夷張騫自月氐還具言西域諸風俗大宛在漢正西可萬里大夏在大宛西南與大宛同俗臣在大夏時見邛竹杖蜀布問曰安得此大夏國人曰吾賈人往市之身毒身毒在大夏東南可數千里其俗土著與大夏同以騫度之大夏去漢萬二千里居漢西南今身毒國又居大夏東南數千里有蜀物此其去蜀不逺矣今使大夏從蜀宜徑天子既聞大宛及大夏安息之屬皆大國多竒物土著頗與中國同業而兵弱貴財物誠得而以義屬之則重九譯致殊俗威德遍於四海欣然以騫言為然乃令騫因蜀犍為發間使四道並出求身毒國各行一二千里其北方閉氐筰南方嶲昆明終莫得通於是始通滇國乃復事西南夷滇池寰宇記秦惠王破滇池此地始通華陽國志云滇池縣治滇國有澤水周回二百里所出深廣下流淺狹如倒流漢為益州郡治蜀漢又改為晉寧郡唐為昆州滇池在晉寧縣𨽻戎州都督北接嶲州戎州今敘州也元鼎六年苴蘭君反平之以為牂牱郡夜郎侯入朝以為夜郎王以邛都為越嶲郡笮都為沈黎郡冉駹為汶山郡廣漢西白馬為武都郡武帝又誅邛君并殺筰侯冉駹之戎等皆震讋乃置四郡且蘭夜郎牂柯已見上寰宇記云郡有越水嶲水皆出深羌界言越嶲者以彰威德也越嶲郡在黎州徼外唐置昆明縣以南接昆明夷越自嶲以東北君長以十數筰都最大為沈黎郡今黎州之境是也自笮以東北君長以十數冉駹最大置汶山郡今茂州諸羌是也在蜀之西自駹以東北君長以十數白馬最大置武都郡今階成興鳳文州等境是也今茂州有路可通文州元封三年武都氐反分徙酒泉今附見此元封二年遣將軍郭昌發兵擊滇滇王降置益州郡元狩三年上將討昆明以昆明有滇池方三百里乃作昆明池以習水戰滇王者其衆數萬人其旁東北有勞深靡莫皆同姓相仗未肯聼帝乃遣郭昌發巴蜀人擊勞深靡莫以兵滇滇王舉國降請置吏入朝於是以為益州郡漢史夜郎之西有靡莫之屬以十數滇最大北接嶲州名為嶲昆明在敘州徼外已詳見上注益州治昆明也孝昭帝始元元年益州牂柯夷反募吏民發奔命擊破之益州亷頭姑繒民反殺長吏牂柯談指同並等二十四邑凡三萬餘人皆反遣水衡都尉發蜀郡犍為奔命萬餘人擊牂柯大破之亷頭姑繒未詳談指同並皆漢牂柯郡屬縣並音伴始元四年姑繒葉榆復反遣呂辟胡將兵擊之辟胡不進蠻夷遂殺益州太守乘勝辟胡戰士溺死者千餘人漢書北至葉榆注澤名因以立號後為縣屬益州郡始元五年大鴻臚廣明等擊益州夷大破之以鉤町侯亡波為鉤町王捕虜三萬餘人獲畜産五萬餘上曰鉤町侯亡波率其邑長人民擊反者斬首捕虜有功其立亡波為鉤町王大鴻瀘廣明賜爵關內侯鉤町益州郡縣後為寧川晉屬興古郡興古在唐為盤州近朱提徼外宣帝地節元年兵都白馬氏反使駱武平定之廢汶山郡置都尉駱武平白馬羌因慰勞汶山吏反百姓詣武自訟一嵗再度更賦至重邊人貧苦無以供給求省郡郡建以來四十五年矣武以狀上遂省汶山郡復置都尉按華陽國志汶山郡東接蜀郡南接漢嘉西接涼州酒泉北接隂平即今茂州汶山縣是也在漢有綿虒縣成帝河平二年西南夷相攻以陳立為牂柯太守討平之夜郎王興鉤町王禹漏臥侯俞更舉兵相攻議者以為道逺不可擊乃遣太中大夫蜀郡張匡持節和解興等不從命刻木象漢吏立道旁射之杜欽説大將軍鳳曰蠻夷輕易漢使不憚國威恐議者選耎復守和解則復曠一時使彼得收獵其衆以相殄滅自知罪成狂犯守尉逺藏溫暑毒草之地雖有孫吳將奔育士若入水火往必焦沒智勇無所施宜因其罪惡未成未疑漢家加誅隂勑旁郡守尉練士馬大司農豫調榖積要害處選任職太守往以秋涼時入誅其王侯尤不軌者即以為不毛之地無用之民不以勞中國宜罷郡放棄其民絶其王侯勿復與通如以先帝所立纍世之功不可隳壞亦宜因其萌芽早斷絶之及已成形然後戰師則萬姓被害鳳於是薦陳立為牂柯太守立至諭告興興又不從立乃從吏數十人出行縣至興國召興至立數責因斷其頭出曉士衆以興頭示之皆釋兵降禹俞震恐入粟千斛牛羊勞吏士興妻父翁指收餘兵迫脅旁二十二邑復反立討之威震南裔鉤町漏卧漢屬牂柯郡後屬興古郡近朱提在敘州徼外今敘州有陳立祠王莽始建國四年西南夷殺牂牱大尹莽篡位改漢制貶鉤町王以為侯王邯怨恨牂柯大尹周欽詐殺邯邯弟承攻殺欽州郡擊之不能服三邊蠻夷愁擾盡反復殺益州尹程隆莽遣平蠻將軍馮茂發巴蜀犍為吏士賦斂取足於民以擊益州出入三年疾疫死者什七巴蜀騷動莽徵茂還誅之莽天鳳三年大發兵擊夜郎蠻不克越嶲蠻亦殺其太守莽更遣將大發天水隴西騎士十萬人擊之始至頗斬首數千其後軍糧前後不相及士卒飢疫復大賦斂而粵嶲蠻夷任貴亦殺太守枚根自立為邛榖王光武建武元年公孫述稱帝粵嶲任貴殺大尹以城降於述益州太守文齊牂柯功曹謝暹入貢齊廣漢人為益州太守造起陂池開通溉灌懇田二千餘頃降集蠻夷甚得其和及公孫述據城都齊固守拒險述拘其妻子許以封侯齊遂不降聞光武即位乃間道遣使自聞三蜀大姓龍傅尹董氏與功曹謝暹保牂柯郡聞光武在河北乃遣使自畨禺江出奉貢漢朝世祖嘉之號為義郎蜀平徴文齊為鎮逺將軍封成義侯帝以齊有義特褒之於道卒詔為起祠堂郡人立廟祀之建武十四年以邛榖王任貴為越嶲太守建武十九年西南夷棟蠶反詔劉尚討之尚誅任貴與棟蠶等連戰破之夷渠帥棟蠶與姑復楪榆梇棟連然滇池建憐昆明諸種反叛殺長吏益州太守繁勝與戰而敗退保朱提遣劉尚等發廣漢犍為蜀郡人及朱提夷合萬三千人尚軍遂度瀘水入益州界與棟蠶等連戰數月破之追至不韋斬棟蠶首邛榖王任貴恐尚定南方已不得自縱因欲襲擊尚尚知其謀即分兵先據邛都遂掩任貴誅之尚虜獲生口馬牛羊甚衆姑復楪榆梇棟屬雲南郡連然滇池建伶昆明屬建寧郡朱提郡在廢曲州今敘州宜賔縣接境建寧郡治味有􅛿鄢縣屬敘州宣化縣接境餘見下注華陽國志云不韋永昌郡治古哀牢國建寧之極西南也建武二十七年哀牢夷酋詣越嶲太守鄭鴻降封賢栗等為君長牢山夷散在溪谷絶域未嘗交通中國建武二十三年其王賢栗遣兵乘箄船南下江漢擊附塞夷􅎷茤􅎷茤王與戰殺其兄弟六人共埋之夜為虎食其尸餘衆驚怖引去賢栗恐曰我曹入邊塞自古有之今攻􅎷茤輒被天誅中國其有聖人乎天祐助之何其明也遂率種人户詣越嶲太守求朝貢自是嵗來朝貢明帝永平元年姑復夷復叛益州刺史發兵討破之傳首京師太守翕安漢人政理清平得夷人和在郡十七年卒蘇祈叟二百人送喪至翕本縣安漢起墳祭祀詔書嘉美為立祠堂蘇祈亦作蘇示如字屬越嶲郡安漢今果州永平十二年哀牢內附以其地置博南哀牢二縣始置永昌郡哀牢王栁貌內附户五萬西南去洛陽七千里割益州郡西部都尉所領六縣合為永昌郡始通慱南山度蘭倉水行者苦之歌曰漢德廣開不賔度博南越蘭津度蘭倉為它人以廣漢鄭純為大守獨尚清亷毫毛不犯夷漢歌詠帝嘉之古今注曰益州西部都尉居嶲唐續漢志六縣謂不韋嶲唐北蘇楪榆邪龍雲南也華陽國志博南山髙三十里席蘭倉水也哀牢在寧州之極西南也有閩􅗛鳩􅀈傈越裸濮身毒之民治不韋縣寧州治味與朱提相接在今敘州徼外味音昧永平十七年白狼夷稱臣奉貢作詩歌誦漢德益州刺史朱輔譯奏之輔好立功名在州數歲宣示漢德威懷逺夷自汶山以西前世所不至正朔所未加白狼槃木唐菆等百餘國户三十餘萬口六百萬以上舉種奉貢稱為臣僕輔上疏曰白狼王唐菆等慕化歸義作詩三章路經邛徠大山零髙坂峭危峻險百倍岐道臣輒譯其詞語謹遣犍為郡掾恭護送詣闕並上其樂詩是時邊郡官吏皆有雕飾畫山神海靈竒禽異獸以眩耀之夷人益畏憚焉白狼在邛筰之外華陽國志曰邛徠山本名邛筰故邛人筰人界也巖阻峻回曲折乃至山上凝水夏結冬則劇寒零髙坂即靈關道也寰宇紀並在雅州蘆山縣章帝建初元年哀牢夷殺守令反攻博南發永昌越嶲益州三郡兵反昆明夷等擊破於博南斬之哀牢王類牢等殺守令攻越嶲太守王尋奔楪榆帝發越嶲益州永昌夷漢九千人討之明年春邪龍縣昆明夷鹵承等應募率種人與諸郡兵擊類牢於博南大破斬之傳首洛陽賜鹵承帛萬匹封為破虜傍邑侯楪榆後屬雲南郡博南永昌郡元和五年以王阜為益州太守始興學校於南中阜治化尤異神馬四匹出滇池河中甘露降白烏見始興文學漸遷其俗尹珍者逺從許叔重受五經還以教授於是南域始有學焉和帝永元六年敦忍乙王莫延慕義遣使獻犀牛大象漢史哀牢夷傳永元九年徼外蠻及撣國王雍由調重譯入貢賜金印紫綬小君長皆加金印綬錢帛並附哀牢夷傳永元十二年旄牛徼外白狼樓薄王唐繒等內附詔賜金印紫綬小豪錢帛各有差附筰都夷傳旄牛今黎州通望縣地安帝永初元年徼外僬僥種夷陸類等內附獻象牙水牛封牛元初元年蜀郡三襄種夷攻蠶陵城殺縣令蠶陵冀州今茂州界元初二年青衣道夷邑長令田舉國內附令田與徼外三種三十一萬口齎黃金旄牛毦舉土內屬安帝增令田爵為奉通邑君毦結毛為飾也音餌元初三年越巂徼外夷大羊等八種户三萬一千口十六萬七千六百二十慕義內屬元初四年越嶲夷反殺遂久令漢史注云遂久故縣在今靡州界屬雲南郡唐盤州元初五年永昌益州蜀郡夷叛應越嶲夷詔益州刺史張喬討平之三郡夷叛應封離衆至十餘萬破壞二十餘縣殺長吏焚掠百姓骸骨委積千里無人詔益州刺史張喬討之喬乃遣從事楊竦將兵至楪榆擊之先以詔書告示三郡乃與封離戰大破之斬首三萬餘級獲生口千五百人資財四千餘萬悉以賞軍士封離等惶怖詣竦乞降竦厚加慰納其餘三十六種皆來降附竦因奏長吏姦猾侵犯蠻夷者九十人皆減死州中論功未及上會竦病創卒張喬深痛之乃刻石勒銘圖畫其象天子以張翕有遺愛拜其子湍為太守竦成都人也永寧元年撣國王再遣使入貢撣國雍由調獻樂及幻人能變化吐火自言我海西人海西即大秦也撣國西通大秦明年元會安帝作樂於庭封由調為漢大都尉延光二年旄牛夷反攻零關張喬擊破之於是分置蜀郡屬國都尉領四縣如太守旄牛屬今黎州零關在今雅州桓帝建和二年白馬羌寇廣漢屬國殺長吏益州刺史率板楯蠻討破之秦時白虎為患夷朐忍等射之號曰板楯蠻延熹二年蜀都三襄夷寇蠶陵蠶陵在唐翼州衛山翼水兩縣古松州悉州之間與茂接境近西羌延熹四年犍為屬國夷寇郡界益州刺史山昱擊破之靈帝熹平五年諸夷反執益州太守雍陟詔以李顒為益州太守討平之諸夷反執雍陟遣御史中丞朱龜將并涼徑兵討之不克朝議以為郡在邊外蠻夷喜叛勞師逺役不如棄之太尉椽巴郡李顒建䇿討伐乃拜顒益州太守與刺史龎芝發板楯蠻擊破平之還得雍陟顒卒夷人復叛以廣漢景毅為太守討定毅初到郡米斛萬錢漸以仁恩少年間米至數十云獻帝建安十九年昭烈定成都以鄧方為庲降都督昭烈遣安逺將軍鄧方為朱提太守庲降都督輕財果毅夷漢敬其威信蜀漢昭烈帝章武元年以李恢為庲降都督鄧方卒昭烈問代於治中從事建寧李恢對曰先零之役趙充國有言莫若老臣遂用恢為都督治平夷縣寰宇記云平夷即興古郡華陽國志云建寧郡治味音昧故庲降都督屯也味在唐為郎州與朱提相接今在敘州徼外後主建興元年益州部耆帥雍闓等以四郡叛益州郡耆帥雍闓聞昭烈崩隕殺太守正昻以張裔為太守闓假鬼教曰張裔府君如瓠壺外雖澤而內實粗殺之不可縳與吳於是執送裔於吳吳王孫權遂用闓為永昌太守永昌功曹吕凱府丞王伉率吏士閉境拒守闓不能進移徼永昌稱説云云凱答檄曰天降喪亂姦雄乘釁天下切齒萬國悲悼臣妾大小莫不思竭筋力肝腦塗地以除國難伏惟將軍世受漢恩以為當躬聚黨衆率先啓行上以報國家下不負先人書功竹帛遺名千載何期臣僕吳越背本就末乎昔舜勤民事隕於蒼梧書籍嘉之流聲無窮崩於江浦何足可悲文武受命成王乃平先帝龍興海內望風宰臣聰睿自天降康而將軍不覩盛衰之紀成敗之符譬如野火在原蹈履河氷火滅冰泮將何所依附曩者將軍先君雍侯造怨而封竇融知興歸志世祖皆流名後葉世歌其美今諸葛丞相英才挺出深覩未萌受遺託孤翊贊季興與衆無忌録功忘瑕將軍若能翻然改圖易迹更步古人不能追鄙土何足宰哉蓋聞楚國不共齊桓是責夫差僣號晉人不長况臣於非主誰肯歸之耶竊惟古誼臣無越境之交是以前後有來無往重承告示發憤忘食故略陳所懷闓不聼都護李嚴與闓書諭闓答曰天無二日土無二王今天下鼎立正朔有三是以逺人惶惑不知所歸也其悖謾如此使郡人孟獲誘扇諸夷諸夷皆從之牂柯太守朱褒越嶲夷王髙定皆叛應闓諸葛亮以新遭大喪撫而不討務農殖榖閉關息民民安食足而後用之建興三年丞相亮南征斬雍闓遂平四郡亮率衆南征參軍馬謖曰南中恃其險逺不服久矣雖今日破之明日復反耳今公方傾國北伐以事強賊彼窺吾勢內虛而叛亦速若殄盡遺類以除後患既非仁者之情且又不可倉卒也夫用兵之道攻心為上攻城為下心戰為上兵戰為下願公服其心而已自安上由水路入越嶲别遣馬忠伐牂柯李恢向益州髙定自汛于定筰卑水多為壘守亮欲俟定元軍衆集合并討之軍卑水定元部曲殺雍闓及士庶等孟獲代闓為王亮既斬定元而馬忠破牂柯李恢敗於南中夏五月亮渡瀘進征益州生虜孟獲使觀營陳之間獲曰向者不知虛實故敗今秪如此即易勝耳乃七擒七縱而亮猶遣獲獲止不去曰公天威也南人不復反矣遂至滇池益州永昌牂柯越嶲四郡皆平亮即其渠率而用之或以諌亮亮曰若留外人則當留兵兵留則無所食一不易也加夷新傷破父兄死喪留外人而無兵者必成禍患二不易也又夷纍有廢殺之罪自嫌釁重若留外人終不能信三不易也今吾欲使不留兵不運糧而綱紀粗定夷漢粗安故耳亮於是悉牧其豪傑孟獲等以為官屬出其金銀丹漆耕牛戰馬以給軍國之用終亮之世夷不復反冬亮自漢陽還亮又為夷作圖譜先畫天地日月君長城府次畫神龍及牛馬羊後畫部主吏乘馬幡蓋巡行安恤又畫牽牛負酒齎金寶詣之之象以賜夷夷甚重之亮又為誓碑云碑若仆蠻為漢奴蠻人至今以石擆之李膺益州記曰瀘水源出曲羅東下三百里兩峯有殺氣暑月舊不可行故武侯以夏渡為難水經注曰瀘津水又東徑不韋縣北而東北流兩岸皆髙山數百丈盧峯最為髙秀孤髙三十餘丈時有瘴氣三月四月徑之必死五月以後行者差無害山海經云黑水之間若水出焉水沿流間關蜀土大度水徼外至莋與若大水合又有孫水名白沙江出臺登縣徑邛都縣入若水澠水又徑越嶲之馬湖縣謂之馬湖江又東北至犍為為朱提縣西為瀘江水又東北至𤏡道縣入於江若水瀘水澠水孫水大度水淹水隨決入而納通稱正是異水沿江通為一津更無别川可以當之樂史寰宇記云嶲州會川縣有瀘津關關上有石峯髙三丈四時多疸氣論曰多語瀘而不同何也酈道元之説在始昌不韋縣樂史之説在嶲州會川縣以史觀之樂史之説是也蓋孫水若水繩水皆出于西北徼外而合於邛莋之間其山即盧峯故唐吐蕃嘗屯三瀘水謂之三瀘以是三水也孔明之渡瀘則由越嶲入益州也益州即滇池連然雲南等縣矣不韋縣在永昌郡又益州之極西南三瀘自越嶲入朱提諸史所言皆然經益州界則有之若謂之徑不韋縣又謂盧峯在不韋則誤矣樂史又以堡夆為盧則擇焉不精矣渡瀘細事爾然非參稽舊史則未易知也改益州郡為建寧郡分永昌置雲南郡牂柯置興古郡以李恢為建寧太守加安漢將軍領交州刺史移治味縣丞相亮上表曰永昌郡吏吕凱用丞王伉等執忠絶域十有餘年雍闓髙定逼其東北而凱等守義不與交通臣不意永昌風俗敦直乃爾以凱為雲南太守伉為永昌太守以馬忠為牂牱太守建寧郡治味縣􅛿鄢屬焉今敘州宜賔界也雲南即古滇王國唐為姚州治弄棟川即漢弄棟蜻蛉縣地漢王褒求金馬碧雞之神在此地也興古郡即唐盤州漢平夷縣地平夷北接味縣同升麻等地郎州又接曲樂州即朱提縣朱提又接今敘州也建興十一年以忠為庲降都督庲降都督張翼用法嚴夷帥劉胄叛丞相亮以參軍馬忠代翼令還其人檄召謂翼宜速即罪翼曰吾臨戰場代人未至當運糧積榖為滅賊之資豈可以黜退之故而廢公家之務乎於是統攝不懈代到乃發忠因其資破胄斬之延熙三年越嶲太守張嶷平定越嶲郡越嶲自丞相亮討髙定之後叟夷數反殺太守是後太守不敢之郡嶷為太守以討降其君長誅戮蘇定莋諸豪酋繕治城郭蠻夷致力定莋臺登卑音班水三縣去郡三百餘里舊出鹽鐡及漆而夷徼久自固食嶷率所領奪取署長吏焉延熙十年汶山平康夷反遣將軍薑維討平之寰宇記云今維州城有薑維故壘唐武德七年白狗羌降附於薑維故城置維州晉武帝泰始七年分益州地置寧州武帝以益州地分廣分益州之建寧興古雲南之交州永昌合四郡為寧州太康三年又廢寧州入益州立南夷校尉以護之以天水李毅為校尉持節統兵鎮南中統五十八部夷族都監行夷事惠帝太安二年復置寧州分建寧以西七縣别立益州郡光熙元年寧州五苓夷攻圍州城太守李毅卒寧州頻嵗飢疫死者以十萬計五苓夷強盛州兵屢敗吏民流入交州者甚衆夷遂圍州城李毅疾病救援路絶乃上疏言不能式遏寇虐坐待殄斃若不矜恤乞降大使及臣尚存加臣重辟若臣已死陳尸為戮時李雄作亂益州而所在有事救援莫至毅卒毅女秀明逹有父風衆推秀領寧州事秀奬勵戰士嬰城固守城中糧盡炙鼠拔草而食之伺夷稍怠輒出兵掩擊破之懷帝永嘉四年寧州刺史王遜滅五苓夷初李毅死其子釗自洛往州人奉之以主州事遣使詣京師求刺史朝廷乃以遜為刺史既至表釗為朱提太守至南廣時寧州內逼於李雄外有夷寇城邑邱墟遜惡衣菜食招集離散勞徠不倦數年之間州境復安誅豪右不奉法者以五苓夷昔為亂首圖計之未有致罪會夷發夜郎莊王墓遜因此遂討滅之及討惡獠剛夷數千落威震南方莊王墓即莊蹻墓也是威王遣莊蹻伐夜郎遂王滇池滇王其後也南廣朱提漢屬犍為郡在今敘州徼外愍帝建興四年夷王沖歸朱提雷照建寧㸑疆降於李雄遣李驤破越嶲李雄伐寧州王遜破之犍為太守朱提雷照流民隂貢平樂太守董霸破牂柯平夷南廣北降李雄又建寧㸑疆與益州太守李易梁水太守董慬保興古槃南以叛雄遣叔父驤破越嶲攻臺登縣遜使督護雲南姚嶽距驤於螳蜋縣違遜指授驤軍大敗嶽追之至瀘水赴水死者千餘人螳蜋朱提屬邑今敘州徼外有螳蜋山瀘水馬湖江也晉成帝咸和二年朱提太守楊術與李雄羅恆戰於臺登兵敗術死臺登屬嶲州今黎州徼外咸和八年李壽拔朱提寧州刺史奉降於李雄雄遣李壽攻朱提以費里為前鋒拔之又遣鎮南任回征木落分寧州之援寧州刺史尹奉降遂有南中之地惟牂柯謝恕不為夀用遂保郡獨為晉官壽復擊取之李雄以李壽領寧州威鎮南中晉康帝建元元年李壽縱獠於蜀事已見上蜀上無獠始從山出北至犍為梓潼布在山谷十餘萬落不可禁制大為百姓之患自此蜀之藩籬蕩然南夷之事不可推訪矣惟蜀獠為患至唐末猶見之史要不足採今不復録後周武帝天和四年平越嶲置西寧州遣大將軍鄭恪將兵平越嶲因置郡李膺益州記云晉永嘉分崩李雄竊據蜀地蕪廢將二十紀夷人侵軼獠又間之公私路絶無可推訪後魏廢帝二年始更招携民漸墾殖因僑立蒙山郡十道志云魏晉以還蠻獠恃險鈔竊乍叛乍服後周武帝征越嶲又開其地因立嚴州取其嚴敬為稱隋開皇四年改嚴州為西寧州蒙山郡今雅州隋文帝開皇十七年史萬嵗擊南寧羌平之初王謙反於蜀梁睿討平之西南夷獠莫不歸附惟南寧州酋師㸑震恃逺不服睿上疏以為南寧州漢世牂柯之地户口殷衆金寶富饒梁南寧州刺史徐文盛為湘東王徴赴荆州屬東夏尚阻未遑逺略士民㸑瓉遂竊據一方國家遙授刺史其子震相承至今而震臣禮多虧貢賦不入乞略定南寧帝未之許其後南寧夷㸑玩來降拜昆州刺史既而復叛乃以左領軍史萬嵗帥衆擊之人自蜻蛉州至於南中夷人前後屯據要害萬嵗皆擊破之過諸葛紀功碑度西瀰河入渠濫川行千餘里破其三千餘部諸夷大懼遣使請降獻明珠徑寸於是勒石頌美隋德萬嵗請將㸑玩入朝詔許之㸑玩隂有二心賂萬嵗以金寶萬嵗於是捨玩而還明年玩復反上欲誅萬嵗玩懼入朝文帝誅之紀功碑在拓東城西瀰河在南詔所都城下即葉榆河也渠濫川在神龍河之西即滇池也以梁毗為西寧州刺史毗為刺史凡十一年蠻夷酋長皆以金多者為豪嶲遞相攻奪略無寧嵗毗患之後因諸酋長相帥以金遺毗毗置金坐側對之慟哭而謂之曰此物飢不可食寒不可衣汝等以相滅不可勝數比今將此來欲殺我邪一無所納於是蠻夷感悟遂不相攻擊上聞而善之蜀鑑卷九

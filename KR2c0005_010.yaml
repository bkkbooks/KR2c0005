body:
  text: 蜀鑑卷十宋郭允蹈撰西南夷始末下吐蕃南詔為唐深患其憂不特以蜀也天寶初分天下為十道劒南節度西坑吐蕃南撫蠻獠治益州統六軍屯十二州之境關係亦重矣次第南夷之始末而以吐蕃之寇蜀者附之唐武德元年以西㸑蠻𢎞達為昆州刺史兩㸑蠻自曲州靖州西南昆州曲軛晉寧喻獻安寧距龍和城通謂之西㸑白蠻自彌鹿升麻二川南至步頭謂之東㸑烏蠻延袤二千餘里土多駿馬犀象明珠隋末㸑玩入朝文帝誅之諸子沒為奴唐髙祖即位以子𢎞達為昆州刺史令持其父尸歸葬益州刺史假綸因遣使招諭其部落皆來降曲州即漢朱提郡升麻在漢建寧郡唐為郎州靖州在曲州之側武德四年昆彌遣使內附昆彌即漢之昆明也以西瀰河為境即葉榆河也嶲州治中吉𢎞緯通南寧至其國説之來降自是嵗與牂柯使偕來武德七年以韋仁壽檢校南寧州都督西南夷內附朝廷遣使撫之類皆貪縱逺民患之仁壽既受命將兵五百人至西瀰河周厯數千里蠻夷望風歸附仁壽承制置七州十五縣各以其豪帥為刺史蠻夷悅服各遣子弟入貢上大悅命仁壽徙鎮南寧以兵戍之太宗貞觀三年蠻酋謝元深來朝西㸑之南有東謝蠻居黔州西三百里是嵗東謝酋長謝元深南謝酋長謝強來朝詔以東謝為應州南謝為莊州𨽻黔州都督牂柯酋長謝能羽及充州蠻入貢詔以牂柯為牂州中書侍郎顔師古因是上言昔周武王時逺國入朝太史次為王會篇今蠻夷入朝如元深寇服不同可寫為王會圖詔可貞觀二十二年西洱河大首領楊同外等入朝松外蠻尚數十部大者五六百户小者二三百凡數十姓趙楊李董為巨族皆擅山川不能相君長有城郭文字領知厯數自夜郎滇池以西皆莊橋之裔有稻麥粟豆絲麻薤蒜以十二月為嵗首嶲州大都督劉伯英上疏松外諸蠻率暫附亟叛請擊之西洱河天竺道可通也太宗以梁建方發蜀十二州兵進討酋帥雙舍拒戰敗走殺獲十餘萬羣蠻震駭走保山谷建方諭降者七十餘部户十萬九千署首領蒙和為縣令餘衆感悅西洱河蠻亦曰河蠻道繇朗州走三千里建方遣竒兵自嶲州道千五百里掩之其帥楊盛大駭建方振旅還大首領楊同外楊劒松外首領蒙羽皆入朝授官秩貞觀二十三年擊西㸑蠻開蜻蛉梇棟為縣㸑蠻之西有徒莫祗蠻儉望蠻於是內屬以其地為傍望覽兵求五州𨽻朗州都督泉蠻地與蜻蛉弄棟接亦𨽻朗州髙宗永徽二年朗州道總管趙孝祖討白水蠻蠻酋秃磨蒲等據險拒戰孝祖皆擊斬之會大雪蠻飢凍死亡略盡孝祖言貞觀中討昆州鳥蠻始開蜻蛉弄棟為州縣弄棟之西有小勃弄大勃勃弄二川常扇誘弄棟欲使之反其勃弄以西與黃瓜葉榆西洱河相接人衆殷實多於蜀川今因破白水之兵請隨便西討撫而安之敕許之永徽六年嶲州道總管曹繼叔破胡叢顯飬車魯等蠻於斜山拔十餘城顯慶元年西瀰蠻酋長陽棟附等率衆內附棟附與顯和蠻酋長王郎祁郎昆黎盤四州酋長王伽衝等帥衆來歸麟德元年置姚州都督府於昆明之弄棟川置咸亨三年以梁積壽為姚州總管將兵討叛蠻昆明蠻內附置殷敦總三州永隆元年築茂州安戎城吐蕃寇河原黑齒常之擊却之先是劍南募兵於茂州西南築安戎城以斷吐蕃通蠻之路吐蕃以生羌為鄉導攻陷其城以兵據之由是西瀰諸蠻皆降於吐蕃吐蕃盡得羊同黨項及諸羌之地東接涼松茂嶲等州南鄰天竺諸夷之盛莫與為比武后垂拱五年詔發兵自雅州開山出襲吐蕃陳子昻上書諌太后欲發梁鳳巴蛋自雅州開山通道出擊生羌因襲吐蕃正字陳子昻上書以為雅州邊羌自國初已來未嘗為盜今一旦無罪戮之其怨必甚且懼誅滅必蜂起為盜西山盜起則蜀之邊邑不得不連兵備守兵久不解西蜀之禍自此結矣臣聞吐蕃愛蜀富饒欲盜之久矣徒以山川阻絶障隘不通勢不能動今國家乃亂邊羌開隘道使其收奔亡之種為鄉導以攻邊是借寇兵而為賊除道舉全蜀以遺之也蜀者國家之寶庫可以兼濟中國今執事者乃徒僥幸之路以事西羌得其地不足以稼穯財不足以富國徒為縻費無益聖德况其成敗未可知哉夫蜀之所恃者險也人之所以安者無役也今國家乃開其險役其人險開則便寇人役則傷財臣恐未見羌戎已有姦盜在其中矣且蜀人尫劣不習兵戰山川阻曠去中夏逺今無故生西羌吐蕃之患臣見其不及百年蜀為戎矣既而役不果興武后延載元年永昌蠻酋董期內附天授中遣御史壽春裴懷古安集西南蠻至是永昌蠻帥部落二十餘萬户內附聖厯元年蜀州刺史張東之乞罷戍姚州不納蜀每嵗遣兵五百人戌姚州路險逺死亡者多蜀州刺史張東之上言以為姚州本哀牢之國荒外絶城山髙水深國家開以為州未嘗得其鹽布之稅甲兵之用而空竭府庫驅率平人受役蠻夷肝腦塗地臣竊為國家惜之請廢姚州以𨽻嶲州嵗時朝覲同之蕃國瀘南諸鎮亦皆廢省於瀘北置關百姓非奉使無得交通往來疏奏不納遣御史唐九徴擊姚州叛蠻破之九徴為姚嶲道討擊使虜以鐡絙居登切梁漾濞二水通西瀰蠻築城戍之九徴毁絙夷城建鐡柱於滇池以勒功睿宗景雲元年姚嶲蠻反攻御史李知古殺之姚州羣蠻先附吐蕃攝監察御史李知古請發兵擊之既降又請築城列置州縣重稅之因誅其豪傑掠子女為奴婢羣蠻怨怒蠻酋引吐蕃攻知古殺之由是姚嶲路絶玄宗開元三年西南夷寇邊遣將軍李立道討之發戎瀘夔巴梁鳳等州兵三萬人拜舊屯兵討之開元十七年嶲州都督張守素破西南蠻拔昆明及鹽城開元二十六年吐蕃救安戎城初儀鳳中吐蕃陷安戎城而據之其地險要唐屢攻之不克劒南節度使王昱築兩城於其側頓軍蒲婆嶺下運資糧以逼之吐蕃大發兵救安戎城昱衆大敗死者數千人昱脫身走糧仗軍資皆棄之貶昱為髙要尉而死安戎城在今茂州見上注蒲婆嶺一名蓬婆嶺册南詔蒙歸義為雲南王南詔本哀牢夷烏蠻别種也夷語王為詔居姚州之西永昌之間東距㸑東南屬交趾西北與吐蕃接北抵益州東北際黔巫王都羊苴徐嗟切咩彌嗟切城先有六詔莫能相一歷代因之以分其勢蒙舍最在南故謂之南詔至皮邏閣浸強大而五詔微弱乃賂王昱求合六詔為一朝廷許之仍賜名歸義於是以兵威脅服羣蠻不從者滅之遂擊破吐蕃徙居大和城其後卒為邊患城距龍尾城十里夷語山陂陀為和故謂之大和城也開元二十八年復取安戎城吐蕃入寇發關中兵救之劍南節度使張宥文吏不習軍旅軍政悉委副使章仇兼瓊兼瓊入奏事盛言安戎城可取上恱之以兼瓊為節度使兼瓊潛與安戎城中吐蕃結謀開門納唐兵盡殺吐蕃將卒使監察御史許逺將兵守之至是吐蕃冦安戎發關中兵救之吐蕃引去安戎改為平戎天寶十載南詔反陷雲南郡劍南節度使鮮於仲通討之敗績楊國忠薦鮮於仲通為劔南節度使仲通性褊急失蠻夷心故事南詔常與妻子俱謁都督雲南太守張虔陀皆私之又多所徴求南詔王閣羅鳳忿怨發兵反陷雲南取夷州三十二仲通將兵八萬討南詔分二道出戎嶲州至曲靖州南詔王閣羅鳳遣使謝罪仲通不許因其使進軍至西洱河與戰大敗士卒死者六萬人仲通僅以身免閣羅鳳斂戰尸築為京觀楊國忠掩其敗狀仍敘其戰功閣羅鳳遂北臣於吐蕃吐蕃號曰東帝閣羅鳳刻碑於國門言不得已叛唐之故天寶十三載劍南留後李宓擊南詔敗沒宓將兵七萬擊南詔閣羅鳳誘之深入至太和城閉壁不戰宓糧盡士卒罹瘴疫及飢死什七八乃引還蠻追擊之宓被擒全軍皆沒楊國忠隱其敗更以捷聞益發中國兵討之前後死者幾二十萬人無敢言者天寶十四載南詔陷越嶲會同軍安祿山反南詔乘亂陷越嶲會同軍據清溪關尋傳驃國皆降之尋傳與驃皆蠻名驃在南詔國南代宗廣德元年吐蕃陷松維保三州吐蕃盡取河西隴右之地入長安上幸陜自鳳翔以西邠州以北皆為左袵陷松維保三州及雲山新築二城西川節度使髙適不能救於是劒南西山諸州亦入於吐蕃矣明年節度使嚴武破吐蕃南鄙兵七萬拔當狗城又拔鹽川城大厯十二年吐蕃寇黎雅州西州節度使崔寧擊破之又大破之於望漢城大厯十四年吐蕃南詔入冦遣神䇿都將李晟等擊破之追擊於大渡河南詔異牟尋新立與吐蕃悉衆二十萬三道入寇一趨茂州踰沒川擾灌口一趨扶文掠方維白壩一侵黎雅掠邛徠關曰吾欲取蜀以為東府諸將不能禦虜連陷州縣刺史棄城走士民竄匿山谷上憂之發禁兵四千人使李晟將之發邠隴范陽兵五千使將軍曲環將之以救蜀東川出軍自江油趣白壩與山南兵合擊吐蕃南詔破之范陽兵追及於七盤又破之遂克維茂二州李晟追擊於大度河外又破之吐蕃南詔飢寒殞於崖谷死者八九萬人吐蕃悔怒殺誘導使之來者異牟尋懼築羊苴咩城延袤十五里徒居之吐蕃封之為日東王德宗貞元三年雲南王異牟尋請內附初閣羅鳳陷嶲州獲西瀘令鄭回回通經術閣羅鳳愛重之及異牟尋為王以回為相號清平官雲南有數十萬衆吐蕃每入寇常以為前鋒賦斂重數又奪其險要地立城堡嵗徴兵助防雲南苦之回説異牟尋自歸於唐曰中國尚禮義有惠澤無賦役異牟尋潛遣人因諸蠻求內附韋臯奏宜招納之以離吐蕃之黨分其勢上令臯先作邉將書以喻之微觀其趣貞元四年雲南遣使入見異牟尋未敢自遣使先遣其東蠻鬼王驃旁且等入見且獻黃金丹砂金示順革丹赤心也德宗嘉之賜以詔書韋臯令其屬崔佐時隨至羊苴咩城時吐蕃使者亦在異牟尋夜迎之佐時宣天子意異牟尋內畏吐蕃顧左右失色遂與佐時盟洗載書於西瀰水發兵攻吐蕃使者殺之吐蕃寇西川韋臯遣人拒破之吐蕃亦發雲南兵雲南內雖附唐外未敢叛吐蕃亦發兵數萬屯於瀘北韋臯知雲南計方猶豫乃為書遺雲南王使東蠻轉攻吐蕃吐蕃始疑雲南遣兵二萬屯會川以塞雲南趣蜀之路臯遣黎州刺史韋晉等與東蠻連兵禦之破吐蕃於清溪關外會川屬嶲州即盧峯關清溪關亦在嶲州貞元五年韋臯將兵擊吐蕃於臺登谷復嶲州嶲州邛部臺登之間有勿鄧蠻勿鄧南七十里有兩林蠻皆謂之東蠻勿鄧苴夢衝為大鬼主數為吐蕃侵獵兩林都大鬼至苴那時乞兵於韋臯以攻吐蕃臯遣將劉朝彩出銅山道吳鳴鶴出清溪道鄧英俊出定蕃柵道進逼臺登城吐蕃追壁西貢川據髙為營苴那時戰甚力分兵大破吐蕃青海􅀈城二節度軍於北谷斬首二千級盡復嶲州之境苴夢衝內附吐蕃斷南詔使路臯以兵召至琵琶川斬之貞元八年韋臯攻吐蕃維州獲其大將論莽熱貞元十年劒南西山羌蠻來降雲南襲吐蕃於神川大破之詔加韋臯押近界羌蠻及西山入國使吐蕃與回鶻爭北庭大戰微兵萬人於雲南異牟尋辭以國小請發五千人異牟尋遣五千人前行自將數萬人踵其後晝夜兼行襲吐蕃於神川大破之取鐡橋等十六城遣使來獻捷遣使立異牟尋為南詔王先是貞元初李泌勸德宗和回紇且請招雲南以斷吐蕃之右臂曰雲南自漢以來臣事中國楊國忠無故擾之使叛臣於吐蕃苦於吐蕃賦煩役重未嘗不一日思為唐臣也其後韋臯遺雲南王書欲與共襲吐蕃驅之雲嶺之外獨與雲南築大城於境上置戍相保永同一家至是異牟尋遣其弟獻地圖上貢及吐蕃所給金印請復號南詔詔以袁滋為册使賜以銀窠金印異牟尋北面跪受册印因與使者宴出玄宗所賜器物笛工歌女滋曰南詔當深思祖考子子孫孫盡忠於唐胡氏曰李鄴侯思扞吐蕃故力勸德宗與回紇和親而招雲南大食天竺以分吐蕃之勢此後吐蕃稀為邊患然唐室之禍乃卒起於雲南以此知中國當以自治為強於非我族類者畫郊圻固封守來則不拒不來不強然後不召患於藩籬之外矣韋臯進南詔奉聖樂驃國者在永昌南二千里西接東天竺亦與波斯婆羅門接距西舍利城二十日行西舍利者中天竺也南屬海比南詔以兵強地接常羈制之聞南詔歸唐有內附心異牟尋遣使楊加明詣韋臯請獻夷中歌曲且令驃國進樂人於是臯作南詔奉聖樂貞元十一年南詔攻吐蕃昆明城取之昆明近嶲州貞元十三年吐蕃入寇嶲州刺史曹髙仕破之於臺登城下貞元十五年吐蕃擊南詔及嶲州韋臯與異牟尋發兵禦之貞元十七年韋臯大破吐蕃於雅州吐蕃寇麟州上敕韋臯深入吐蕃以分其勢紆北邊患臯遣兵二萬分出九道攻維保松州及棲雞老翁城大破吐蕃於雅州轉戰千里拔城七遂圍維州及昆明吐蕃救維州西川兵據險設伏以待之虜衆大敗擒其將論莽熱維州昆明竟不下引兵還南詔大破吐蕃於瀘水韋臯屯重兵於嶲州扼西瀘吐蕃路吐蕃謀以兵襲南詔以八萬人圍嶲州臯命部將武免等屯嶲州約南詔有急進軍吐蕃引衆五萬自曩貢川分二軍攻雲南一軍自諾濟城攻嶲州異牟尋先欲攻東蠻臯報嶲州實往來道扞蔽數州虜百計窺故嚴兵以守之東蠻庸敢懷二乎免接兵嶲州雖南詔境亦所在屯戍吐蕃懲野戰數北乃屯三瀘水遣間誘瀕瀘諸蠻復城悉攝悉攝吐蕃險要也蠻酋潛導南詔與臯部將杜毗等夜絶瀘破虜屯斬五百級又破之於瀘西吐蕃君長共計不得嶲州患未艾也文宗大和三年南詔入成都異牟尋既死子尋閣勸立尋閣勸死子勸龍晟立元和十一年為㺯棟王嵯顛所殺嵯顛遂専國政於是西川節度使杜元頴治無狀障候弛沓相蒙戍卒反為卿導襲嶲戎二州又陷卭州自卭州引兵徑抵成都又寇東川節度使郭釗兵弱不能戰以書責嵯顛嵯顛復書曰杜元頴侵擾我故興兵報之耳與釗修好而退蠻留成都西郭十日其始慰撫蜀人市肆安堵將行乃大掠子女百工數萬人及珍貨而去嵯顛自為軍殿及大度水謂人曰此南吾境也聽汝哭别鄉國衆皆慟哭赴水死者以千計嵯顛遣使上表曰杜元頴不恤軍士軍士競為鄉導祈誅虐帥倘誅之不遂無以慰蜀土之心願陛下誅之貶元頴循州司馬太和五年吐蕃維州副使悉怛謀請降西川節度使李德裕表其狀不受南詔入寇蜀中殘弊西川節度使李德裕至鎮吐蕃維州副使悉怛謀請降德裕遣維州刺史虞藏儉入據其城具奏其狀且言欲遣生羌三千燒十三橋搗西戎腹心是韋臯沒身恨不能致者也事下尚書省集百官議皆請如德裕䇿牛僧孺曰吐蕃之境四面各萬里失一維州未能損其勢比來修好約罷戍兵中國禦戎守信為上彼若來責失信怒氣直辭不三日至咸陽橋此時西南數千里外得百維州何所用之徒棄誠信有害無利此匹夫所不為況天子乎上以為然詔德裕以其城歸吐蕃執悉怛謀及與偕來者悉歸之吐蕃盡誅之于境上極其慘酷德裕由是怨僧孺益深會昌初德裕為相上疏云維州據髙山絶頂三面臨江在戎虜平川之衝是漢地入兵之路初河隴盡沒唯此獨存吐蕃潛以婦人嫁此州門者二十年後兩男長成竊開壘門引兵夜入遂為所陷號曰無憂城從此得併力於西邊更無虞於南路憑陵近甸旰食纍朝韋臯欲經略河湟須此城為始萬旅盡鋭急攻數年雖擒論莽熱而還城堅卒不可克臣初到西蜀外揚國威內葺邊備其維州熟臣信令空壁來歸臣始受其降南蠻振攝山西八國皆願內屬其吐蕃合水棲雞等城既失險厄自須抽歸可減八處鎮兵坐守千餘里舊地且維州未降前一年吐蕃猶圍魯州豈顧盟約臣受降之初指天為誓面許奏聞各加酬賞當時不與臣者望風疾臣詔臣執送悉怛謀等令彼自戮臣寧忍以三百餘人命棄信偷安纍表陳論乞垂矜惻答詔嚴切竟令執還將吏對臣無不隕涕蕃帥即以此人戮於境上絶忠款之路快凶虐之情乞追奬忠魄各加褒贈詔贈悉怛謀右衛將軍其後大忠初杜悰復取維州維州今威州司馬公曰唐新與吐蕃修好而納其維州以利言之則維州小而信大以害言之則維州緩而關中急然則為唐計者宜何先乎悉怛謀在唐則為向化在吐蕃不免叛臣其受誅也又何矜焉且德裕所言者利也僧孺所言者義也胡氏曰司馬公之言過矣使維州本非唐地既與之和棄而不取姑守約信可矣本唐之地為吐蕃所侵乃欲守區區之信舉險要而棄之可乎僧孺所謂虜不三日至咸陽特以大言怖文宗非事實也夫奪吾之地而約我以盟此正蒲人所以要孔子者非信也取我故地乃義所當為司馬公不以義斷之而以利害為言又斥德裕為利取僧孺為義是皆無所據矣故以維州歸吐蕃棄祖宗土宇縳送悉怛謀沮歸附之心僧孺以小信妨大計也下維州遣兵據之洗數十年之恥追奬悉怛謀贈以官秩德裕以大義謀國也此二人是非之辨也太和六年李德裕築仗義禦侮柔逺城德裕建籌邊樓按南道山川險要與蠻相入者圖之左西道與吐蕃接者圖之右其部落衆寡饋餫逺邇曲折咸具乃招習邊事者與之商訂凡虜之情偽盡知之料擇州兵士無敢怨又請甲人於安定弓人河中弩人浙西器械犀利又率戶二百取一人使習戰緩則農急則戰謂之雄邊子弟總十一軍築仗義城以制大度清溪關之阻作禦侮城以控榮經犄角勢作柔逺城以扼西山吐蕃復卭徠關徙嶲州治臺登以奪蠻險舊制嵗抄運內粟贍黎嶲州起嘉眉道陽山江而達大度乃分餉諸戍常以盛夏至地苦瘴毒輦夫多死德裕命轉卭雅粟以十月為漕始先夏而至以佐陽山之運饋者不涉炎月逺民乃安又奏遣使詣南詔索所掠人口得數千人而還上命德裕修塞清溪關以斷南詔入寇之路德裕上言通蠻細路至多不可塞惟重兵鎮守可保無虞但黎雅以來得萬人成都得二萬人精加訓練則蠻不敢動矣邊兵又不宜多須力可臨制時北兵皆歸本道惟河中陳許三千人在成都有詔來年以歸蜀人忷懼德裕奏乞鄭滑五百人陳許千人以鎮蜀且言蜀兵脆弱新為蠻寇所困皆破膽不堪征戍若壯兵盡歸則與杜元頴時無異蜀不可保恐議者云蜀經蠻寇以來已自增兵向者蠻寇已迫元頴始捕市人為兵約三千餘人徒有其數實不可用郭釗募壯兵僅約百餘人臣復召募得二百餘人此外皆元頴舊兵也恐議者又聞一夫當關之説以為清溪可塞臣訪之蜀中老將清溪之旁大路有三小徑無數皆東蠻臨時為之開通若言可塞則是欺罔朝廷要須大度水北更築一城迤邐接黎州以大兵守之方可況聞南詔以所掠蜀人二千及金帛賂遺吐蕃若使二虜知蜀虛實連兵入寇誠可深憂其朝臣建言者蓋由禍不在身望人責一狀留入堂案它日敗事不可令臣獨當國憲朝廷皆從其請德裕乃練士卒葺堡障積糧儲以備邊蜀人粗安德裕又奏蜀兵羸疾老弱者從來終身不簡臣命立五尺五寸之度簡去四千四百餘人復簡募少壯者千人以慰其心所募北兵已得千五百人與土兵參居轉相訓習日益精練又蜀工所作兵器徒務華飾不堪用臣今取工於别道以治之無不堅利宣宗大中十三年南詔僣號寇陷播州初韋臯開清溪道以通羣蠻使入貢又選羣蠻子弟聚之成都教以書數以羈縻之既而軍府厭於廩給又蠻使入貢利於賜與所從傔人浸多杜悰奏減其數南詔豐祐怒入貢不時頗擾邊境子酋龍立乃自稱皇帝國號大禮遣兵陷播州懿宗咸通三年南詔攻陷雍州寇嶲州杜宗上言南詔強盛西川兵食單寡未可輕與之絶且應遣使弔祭上從之會南詔寇嶲州遂不行咸通四年南詔陷交趾經略使蔡襲死之咸通五年南詔寇雍州官軍陷沒咸通七年髙駢大破南詔蠻復取交趾咸通九年建定邊軍於邛州以李師望為節度使鳳翔少尹李師望上言嶲州控扼南詔為其要衝成都道逺難以節制請建定邊軍屯重兵於嶲州以卭州為理所朝廷從之以師望為嶲州刺史充定邊軍節度眉蜀邛雅嘉黎等州觀察統押諸蠻并統領諸道行營制置等使師望利於専制方面故建此䇿其實邛距成都才六百十里嶲距卭千里其欺罔如此咸通十一年南詔入寇遂入成都初南詔遣使來李師望欲激怒南詔以求功遂殺之朝廷徴師望以竇滂代之滂貪殘又甚於師望故蠻寇未至而定邊已困矣是月南詔酋龍傾國入寇進入嶲州安再榮守清溪關蠻攻之再榮退屯大渡河北與之隔水相射九日八夜蠻密分軍伐木開道逾雪坡奄至沐源川竇滂遣將帥五百人拒之舉軍覆沒十二月蠻詐為我敗卒至江岸呼船以濟衆乃覺之遂陷犍為縱兵焚掠凌榮二州之境後數日蠻軍大集於凌雲寺與嘉州對岸遂陷嘉州酋龍詐遣人約和語未畢乘船茷爭渡竇滂單騎宵遁再榮等進兵乘夜攻之蠻大驚引去進陷黎雅卭州軍資儲峙散於亂兵之手蠻至城已空通行無礙矣西川之民爭走入成都所占地不過一席許雨則戴盎以自芘又乏水取摩訶池泥汁澄而飲節度使盧耽召彭州刺史吳行魯共修守備選兵三千人號曰突將蠻至眉州耽遣使與之約和蠻報曰我輩行止只繫雅懷進軍新津盧耽遣使告急於朝以紓一朝之患朝廷命支詳為宣諭通和使蠻長驅而北陷雙流遣人負綵幕至城南云欲張陳蜀王廳以居驃信蠻謂君王為驃信遂抵成都城下前一日盧耽遣王晝至漢州詗援軍時興元六千人鳳翔四千人已至漢州會竇滂以四千人自導江奔漢州就援軍以自存王晝以興元資簡兵三千餘人軍毗橋與蠻戰不利退保漢州竇滂欲西川陷沒以分其責每款留官軍不使遽進二月朔蠻合梯衝四面攻成都城上以鈎鐶挽之使近投火沃油焚之攻者皆死蠻斂兵約和遣使迎支詳時顔慶復以援軍將至詳謂蠻使曰受詔約和今雲南乃圍成都則與曩日異矣且朝廷所以和者冀其不犯成都也蠻復進攻城初韋臯招南詔以破吐蕃既而蠻訴以無甲弩皋使匠往教之數嵗蠻中甲弩皆精利朝廷以顔慶復為東川節度使凡援蜀諸軍皆受慶復節制慶復至新都蠻分兵拒之慶復大破蠻軍殺二千餘人蜀民數千人爭操芟刀白棓以助官軍呼聲震野蠻步騎數萬復至宋威以二千人會戰蠻軍大敗死者五千餘人退保星宿山威進軍沱江驛距成都三十里蠻遣其臣楊定詣支詳請和亦依違答之官軍至城下與蠻戰奪其升仙橋是夕蠻自燒攻具遁去顔慶復始教蜀人築壅門城穿塹引水滿之植鹿角分營鋪蠻知有備自是不復犯成都矣僖宗乾符二年南詔寇西川陷黎州入卭徠關節度使髙駢追至大度河大破之南詔作浮梁濟大度河防河兵馬使黃景復俟其半濟擊之蠻敗走斷其浮梁蠻以中軍多張旗幟當其前而分兵潛出上下流合二十里濟襲破諸城柵夾攻景復景復陽走而設伏以待之蠻兵大敗歸至之羅谷遇國中發兵繼至新舊相繼遂寇大渡河與景復戰連日援兵不至景復遂潰蠻乘勝陷黎州入卭徠關攻雅州成都驚擾大為守備以髙駢為西川節度使駢先遣使走開成都門曰吾在交趾破蠻三十萬衆蠻聞我來逃竄不暇今春氣向暖十萬人藴積城中生死共處汙穢鬱蒸將成癘疫不可緩也蠻方攻雅州聞之引兵去駢又奏南蠻小醜易以支吾所發鄜坊等兵並乞勒還既至成都明日發步騎五千追南詔至大度河擒其酋長數十人至成都斬之修復卭崍關大度河諸城柵又築城於戎州馬湖鎮號平夷軍又築城於沐浴川皆蠻入蜀之要道也各置兵數千戍之自是蠻不復入寇駢又築成都羅城周二十五里凡九十六日而畢駢又遣僧景先説南詔先是西川遣使至南詔驃信皆坐受其拜駢以其俗尚浮屠故遣景先往驃信果迎拜信受其言沐浴川嘉州接蠻境分兩路川在東南路清溪關在嶲州乾符四年南詔酋龍卒子法立請和許之酋龍嗣位以來為邊患殆二十年中國為之虛耗而其國中亦弊酋龍諡景莊皇帝子法立好畋獵酣飲委國事於大臣嶺南西道節度使辛儻奏南詔請和且言諸道兵戌雍州嵗久餽餉疲弊請許其和使嬴瘵息肩詔許之但留荆南宣歙數軍餘減十七朝廷既許南詔和無表但令督爽牒中書請為弟而不稱臣督爽蠻官也詔百官議之禮部侍郎崔淡等以南詔驕僭無禮髙駢不達大體反因一僧呫嚅卑辭誘致其使若從其請恐垂笑後代駢上表與淡等辨詔諭解之鄭畋盧攜共議攜欲和親畋不可攜怒拂衣起袂罥硯墮地破之上聞之曰大臣相詬何以儀刑四海遂皆罷之初南詔陷安南敕徐泗分兵八百人戌桂州約三年一代觀察使崔彥曽性嚴刻都押牙尹戡等用事戍桂州者已六年屢求代還戡言於彥曽以軍帑空虛發兵所費多請更留舊戍卒一年彥曽從之戍卒聞之怒都虞侯趙可立等作亂殺都將王仲甫推糧料判官龎勛為主朝廷討之數平乃定黃巢於是繼起而唐亡范正獻公曰邉塞自古迭為中國患由秦以來未有得志於南蠻者也蓋以瘴毒險阻不得天時地利所恃者人和而已而民從役皆知必死如往棄市則是三者皆亡矣明皇之末南詔盛強至於懿宗陷安南圍成都中國首尾疲於奔命其後龎勛之亂起於桂北之戍黃巢之寇本於徐方之餘唐室之衰宦者蠱其內南詔擾其外財竭民困海內大亂而因以亡矣蠻夷非能亡中國也而中國之亡蠻夷常為資是以聖王不重外而輕內不勤逺而忘邇恐征伐不息變生於內而搖其本也論曰漢武帝窮荒極逺郡縣四夷以一時之侈心而基後世之多事彼固不知三代聖王之盛德逺慮也南夷在蜀徼外叛服不常而漢之威令足以震讋之漢之官吏足以厭服之至於武侯而南征四郡深入不毛將以絶後顧之虞非特藉其資以給軍用而已王業偏安不得已也然天威所臨至於今能使之褫魄喪膽北向厥角不幸而為永嘉李氏竊據縱獠於蜀蜀人被南夷之禍者幾三百年時無武侯而武帝開邊之患於是乎慘矣至唐而鮮于仲通辱國喪師蠢爾小醜遽有輕中國之心三入蜀境而南詔之患與吐蕃回紇等惟我藝祖逺法三代玉斧畫河不貪其土而蜀於是鮮有腹心之疾凡我疆吏謹固封圻一是皆以砥礪亷隅為安邊之本孰謂其不行於蠻貊哉雖百世而無南夷之憂可也蜀鑑卷十

body:
  text: 蜀鑑卷三宋郭允蹈撰漢諸葛忠武侯北伐蜀漢建興五年丞相亮出屯漢中營沔北陽平石馬陽平沔之北石馬或云陽平闗北有白馬山石當作白字之誤也建興六年丞相亮出師攻祁山天水南安安定皆降亮與羣下謀之丞相司馬魏延請假精兵五千負糧五千直從褒中出循秦嶺而東當子午而北不過十日可到長安公從斜谷來亦足以達亮以為此危計不如安從坦道可以平取隴右不用延計亮揚聲由斜谷取郿使趙雲鄧芝為疑軍據箕谷亮身率大軍攻祁山戎陣整齊號令明肅於是天水南安安定皆叛應亮闗中響震祁山在今岷州長道縣東寰宇記云上有城極嚴固開山圖云祁山九州之名阻天下之竒峻又云南岈北岈萬有餘家諸葛亮表云祁山縣去沮五百里有人萬户沮在今沔州天水南安今秦州地安定今涇州地三郡即隴右也郿今鳳翔府郿縣箕谷今鳳翔府寳雞縣子午谷王莽所通從杜陵直絶南山徑漢中從今洋州路魏遣將張郃拒亮馬謖與郃戰於街亭敗績天水三郡復入於魏亮以馬謖督諸軍在前與張郃戰於街亭謖違亮節度舉措煩擾舎水上山不下據城張郃絶其汲道擊大破之亮乃㧞西縣千餘家還漢中收謖下獄殺之趙雲鄧芝亦敗於箕口天水三郡復入於魏街亭今秦州隴城縣有街泉亭即馬謖所敗之地寰宇記云南鄭載之誤矣西縣隴西郡有西縣今興元府有諸葛亮城樂史云亮㧞隴西千餘家築城以處之冬丞相亮出散闗圍陳倉不克師還魏將王䨇追亮亮破其師斬之亮上言曰漢賊不兩立王業不偏安以先帝之明固知臣伐賊才弱敵強然不伐賊王業亦亡與其坐而待亡孰與伐之今民窮兵疲而事不可息事不可息則住之與行勞費正等臣鞠躬盡瘁死而後已至於成敗利鈍非臣之明所能逆睹魏使郝昭守陳倉亮不能克糧盡引去散闗今大散闗陳倉今鳳翔寳雞縣城是也寰宇記云陳倉有二城相連上城是秦文公築下城郝昭築八年丞相亮攻武都隂平二郡㧞之亮遣其將陳式攻武都隂平二郡郭淮引兵救之亮自出至建威淮退遂㧞二郡以歸曹操嘗徙武都氐五萬餘落於秦州故丞相亮得取其地建威水經注漢水又西建安川入焉導源建威西北鳳州圖經云梁泉縣有武侯城又有思計臺在城南武侯登臺籌畫因以為名華陽國志武都郡治下辨今成州一名武街有故道縣河池縣即鳳州也葢武都乃今階成鳳州之地南鄭之喉襟武侯所必爭也隂平今文龍等州丞相亮徙府營於南山原上築漢城於沔陽築樂城於城固昭烈即位於沔陽故漢中治沔陽今西縣是也以沔陽為漢城城固為樂城通鑑所書據華陽國志寰宇記云西縣有樂城在山上周三十里亮築以防邉當考魏使司馬懿由西城張郃由子午曹真由斜谷來攻丞相亮次於城固赤坂㑹天大雨棧道斷絶真等皆還西城今金州子午在萬年縣斜谷今鳳翔府城固在興元府建興九年春丞相亮出軍圍祁山始以木牛運魏司馬懿張郃救祁山夏六月師還郃追至青封破之郃中箭死亮分兵留攻祁山自逆司馬懿於上邽郭淮等徼亮亮破之因大芟刈其麥與懿遇於上邽之東懿歛軍依險兵不得交亮引還懿等尋亮至於鹵城亮既至又登山掘圍不肯戰賈詡魏平數請戰因曰公畏蜀如虎柰天下笑何懿病之乃使張郃向亮亮使魏延等逆戰魏兵大敗漢人獲甲首三千懿還保營六月亮以糧盡退軍懿遣張郃追之郃進至木門與亮戰蜀人乗高布伏弓弩亂發飛矢中郃右膝而卒上邽鹵城皆在今秦州青封通鑑云在今木門未詳建興十年亮休士勸農於黄沙作流馬運黄沙寰宇記云漢水之東黄沙水注之水側有黄沙屯亮所開也今興元府有黄沙倉建興十一年丞相亮使諸軍運米集斜谷伐魏夏四月至郿軍於渭水之南屯五丈原司馬懿引軍渡渭背水為壘以拒之謂諸將曰亮若出武功依山而東誠為可憂若上五丈原諸將無事矣亮果屯五丈原郭淮言於懿曰亮必爭北原若跨渭登原連兵北向隔絶隴道揺盪民夷非我之利也乃使淮屯北原漢兵大至淮逆擊却之亮以前者數出皆以糧運不繼使已志不伸乃分兵屯田為乆駐之基耕者雜於渭濵居民之間百姓安堵軍無私焉五丈原在武功故縣今在鳳翔府郿縣水經注云積石原在渭水北即郭淮所據北原也八月丞相亮薨於渭南亮數挑戰懿不敢出亮遣遺巾幗懿患之上表請戰魏主叡使辛毗杖節為軍師以制之亮謂其下曰彼本無戰情所以固請戰者示武於其衆耳將在軍君命有所不受茍能制吾豈千里而請戰耶相持百餘日亮疾病宻授揚儀費禕等退師節度亮薨年五十四遺令𦵏定軍山不封不樹莫知所在張宣公曰三代衰五伯起而功利之説盈天下謀國者不復知正誼明道之為貴三老董公獨得宏綱以告漢高帝惜漢高帝未能盡其用也武侯當漢祚之季乃能執其機而用之其言曰漢賊不兩立臣鞠躬盡力死而後已至於成敗利鈍非臣之明所能逆睹嗚呼此夏少康四十年經營宗祀而卒以配天之本心也昭烈名義既正好賢之意又篤安得不以身許之侯恢復規模先務為根本之計務農訓兵内治國事國事既定北向致討軍旅将發拜表納忠尤為切至侯之慮深且逺矣侯之規模至使耕者雜於渭濵軍無私焉輿圖之復已在目中不幸薨謝匪大數然歟或謂魏延之策惜侯不用不知天将昌漢以侯舉措掃擒亂賊直餘事耳行險僥倖非侯志也蜀漢蔣琬費禕保蜀後主延熈元年大将軍蒋琬出屯漢中丞相亮之薨至是五年延熈五年将軍姜維自漢中還屯涪縣延熈六年大司馬蒋琬自漢中還住涪以王平督漢中先是蔣琬以丞相亮數出秦川糧運乏絶迄無成功乃多作舟船欲乗漢沔東下襲魏興上庸會舊疾連動未時得行漢人或以為事有不㨗還路甚難非常策也後主遣費禕姜維等喻指琬乃上言魏跨帶九州未易速得志且當分裂蠶食摧其支黨議以凉州胡塞之要進退有資且羗胡思漢如渇宜以維為凉州刺史若維征行銜制河右臣當帥軍為維後繼今涪水陸四通惟急是應若東北有虞赴之不難請徙屯涪從之維遂徙屯琬自漢中還住涪疾益甚以漢中太守王平督漢中吳步隲朱然亦上疏於呉王曰自蜀還者咸言蜀欲背盟與魏交通蔣琬守漢中聞司馬懿南向不出兵乗虚以掎角之反委漢中還近成都事已彰灼無所復疑宜為之備魏以西城為魏興郡在今金州上庸今房州涪今綿州論曰蔣琬委去南鄭稱疾屯涪無復逺畧非但不足於攻且不足於守然則所謂乗漢沔以復漢中保凉州而役氐羌殆虚語耳蜀之不競琬之罪也延熈七年魏大將軍曹爽由駱谷向漢中将軍王平拒興勢遣大将軍費禕往赴救魏師退禕還成都爽西至長安發卒十萬餘人與夏侯𤣥自駱谷入漢中漢中守兵不滿三萬諸將皆恐欲守城不出以待涪兵王平曰漢中去涪垂千里賊若得闗便為深禍今宜先遣劉敏據興勢平為後拒若賊分向黄金平率千人下自臨之比爾間涪軍亦至此計之上也遂率前領據興勢多張旗幟彌亘百餘里遣大將軍費禕督諸軍救漢中爽兵距興勢不得進涪軍及費禕兵繼至遂引退禕進據三嶺以截爽爽爭險苦戰僅乃得過失亡甚衆闗中為之虗耗駱谷在鳳翔府盩厔縣西南一百二十里寰宇記云漢魏通道也興勢今洋州興道縣有興勢山駱谷入洋州上屈曲八十里下屈曲八十四盤黄金戍在縣西北張魯所築水陸艱險以黄金水得名三嶺闗名在蒻嶺闗南陽嶺北延熈八年大將軍費禕至漢中行圍守延熈九年費禕還成都大司馬蔣琬卒延熈十年雍凉羌胡叛降漢漢姜維將兵出隴右以應之延熈十一年大将軍費禕出漢中延熈十二年衛将軍姜維出攻雍州不克而還維至雍州依麴山築二城使句安李歆等守之魏郭淮陳㤗禦之㤗曰麴城雖固去蜀險逺當須運糧可不血刄而㧞其地也乃使泰率徐質鄧艾進兵圍麴城斷其運道及城外流水安等挑戰不許将士困窘分糧聚雪以引日月維引兵救之出自牛頭山與㤗相對㤗曰兵法貴在不戰而屈人今絶牛頭維無反道則我之禽也遣使白淮使淮趣牛頭截其還路淮從之進軍洮水維懼遁走安等孤絶遂降鄧艾留屯白水北維遣其将廖化自白水南向艾結營艾謂諸将曰維必自東襲取洮城洮城在水北去艾屯六十里艾即夜潛軍徑到維果來渡而艾先至據城得以不敗漢軍遂還延熈十三年姜維復入西平不克延熈十四年大司馬費禕出屯漢壽昭烈改葭萌為漢壽延熈十五年盗殺大司馬禕於漢壽姜維出師隴右延熈十六年姜維出師圍狄道姜維自以練西方風俗兼負其才武欲誘羌胡以為羽翼謂自隴以西可斷而有每欲興軍大舉費禕常裁制不從及禕死維得行其志乃將數萬人圍狄道司馬師使郭淮陳泰拒之維糧盡退還陳壽蜀書云維圍南安狄道今熈州渭州南安今鞏州延熈十七年姜維出師隴西㧞狄道河間臨洮三縣民居於綿竹繁縣狄道長李簡宻書請降於漢六月姜維出隴西自狄道進㧞河間臨洮徐質與維戰殺将軍張嶷漢兵乃還狄道今熙州渭州臨洮今洮州所治臨潭縣河間當作河闗今西寧州龍支縣延熙十八年姜維出師至狄道與魏将王經戰大破之經退保狄道城維駐兵鍾題維将數萬人至枹䍐趣狄道魏陳㤗敕其将王經進屯狄道湏㤗軍到東西合勢㤗進軍陳倉經所統諸軍於故闗與漢人戰不利經輙渡洮水與維戰於洮西大敗以萬餘人還保狄道城維進圍之鄧艾與陳㤗并力拒維㤗謂諸将曰姜維提兵深入當挫其鋭氣王經與戰使賊得計經既破走維若進兵東向據櫟陽積穀之實放兵收降招納羌胡東爭闗隴傳檄四郡此我之所惡也而乃以乗勝之兵挫峻城之下孤軍逺僑糧榖不繼是我破賊之時也遂進軍度髙城嶺潛行夜至狄道東南髙山上多舉􅇏火鳴鼓角維不意救兵卒至縁山急攻㤗與交戰維遁走退駐鍾題枹䍐今河州洮水源出西羌中北至抱䍐東入河狄道今熙渭坊州地鍾題在古狄道縣延熙十九年姜維出師攻祁山趣上邽與鄧艾戰敗績姜維在鍾題鄧艾曰洮西之敗非小失也今彼以船行吾以陸軍勞逸不同狄道隴西南安祁山各當有守彼專為一我分為四彼從南安隴西困食羌穀若趣祁山熟麥千頃為之外倉賊有黠計其來必矣率衆出祁山聞艾已有備乃西從董亭趣南安艾據武城山以拒之維與艾爭險不克其夜渡渭東山縁山趣上邽艾與戰於叚谷大破之狄道今熙州隴西今渭州南安今鞏州祁山今長道縣渭水出今隴州渭州之間上邽今秦州叚谷水出秦州清水縣東山下延熙二十年姜維出駱谷次於芒水維聞魏分闗中兵以赴淮南欲乘虚向秦川率數萬人出駱谷至沈嶺時長城積穀甚多鄧艾進兵據之以拒維維壁於芒水數挑戰艾不應駱谷在盩厔縣沈嶺寰宇記云姜維嶺在縣南五十里長城在華城華隂縣秦晉分界處芒水注水經云出南芒谷景耀二年督漢中胡濟屯漢壽将軍王含守樂城䕶軍蔣斌守漢城初昭烈留魏延鎮漢中實兵諸圍以禦外敵及姜維用事建議以為錯守諸圍適可禦敵不獲大利不若歛兵聚榖退就漢樂二城使敵不得入平且重關鎮守以擇之敵攻闗不克千里運糧自然疲乏引退之日然後諸城併力摶之此殄敵之術也後主從之漢城在沔陽今西縣樂城在城固今洋州杜佑通典云洋州郡之西鄉興道洋源皆為漢成固舊地今非故境矣漢壽在今利州論曰蜀之門尸漢中而已漢中之險要在漢魏則陽平而已武侯之用蜀也固陽平之圍守而分二城以嚴前後之防其守也使之不可窺而後其攻也使之莫能禦此敵所以畏之如虎也今姜維之退屯漢壽也徹漢中之備而為行險僥倖之計則根本先撥矣異時鍾會長驅而入漢中曾無一人之守而敵已欣然得志初不必鄧艾之出江油而蜀已不支不待知者而後解見嗚呼姜維之亡蜀也殆哉景耀五年姜維出師洮陽與鄧艾戰敗於侯和維退住沓中侯和城名其後苻秦使王撫守侯和鄧艾鍾會取蜀後主景耀六年魏遣鄧艾鍾會等伐蜀取之魏大興徒衆命鄧艾鍾會諸葛緒等數道並攻姜維先表後主聞鍾會治兵闗中欲規進取宜遣張翼廖化督諸軍分䕶陽安闗口及隂平之橋頭以防漢主不聽鄧艾自狄道趣甘松沓中以連綴姜維雍州刺史諸葛緒督三萬人自祁山趣武街橋頭絶維歸路鍾會統十餘萬衆分從斜谷駱谷子午谷趣漢中漢人聞魏兵至乃遣廖化将兵詣沓中為姜維繼援張翼董厥等詣陽安闗口為諸圍外助敕諸圍皆不得戰退保漢樂二城城中各有兵五千人翼厥比至隂平聞諸葛緒将向建威故住待之㑹率諸軍行至漢中使李輔圍王含於樂城荀愷圍蒋斌於漢城㑹徑過西出陽安口遣人祭諸葛亮墓鍾會聞闗口已下長驅而前鄧艾遣天水太守王頎直攻姜維營維聞鍾㑹諸軍已入漢中引兵還頎等追躡於漒川口大戰維敗走遂還至隂平合集士衆欲赴闗城未到聞其已破退趣白水遇廖化張翼董厥等合兵守劔閣以拒會維列營守險㑹攻之不能克糧道險逺軍食乏欲引還鄧艾上言賊已摧折宜遂乗之若從隂平由邪徑經漢徳陽亭趣涪出劔閣西百里去成都三百餘里竒兵衝其腹心出其不意劔閣之守必還赴涪則㑹方軌而進劒閣之軍不還則應涪之兵寡矣遂自隂平行無人之地七百餘里鑿山通道造作橋閣山高谷深至為艱險又糧運将匱瀕於危殆艾以氊自裹推轉而下将士皆攀木緣崖魚貫而進先登至江由蜀守将馬􅊬降諸葛瞻督諸軍拒艾至涪亭住不進艾遂長驅而前擊破瞻前鋒瞻退住綿竹列陣以待艾遂與子尚俱死之譙周勸後主出降後主從其計北地王諶哭於昭烈之廟先殺其妻子而後自殺後主又遣使喻姜維使降鍾㑹維降将士以刄擊石陽安闗口即陽平闗隂平橋頭即今文州橋頭在白水上水經注云白水東北徑橋頭甘松城名在秦州其後乞伏國仁升以為郡今廢松中是也沓中近甘松其後王澄自孱陵欲奔沓中蜀鑑卷三

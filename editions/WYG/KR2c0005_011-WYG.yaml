body:
  text: 天險不可升也地險山川邱陵也王公設險以守其國險之時用大矣哉易坎卦髙不可升者天之險也山川丘陵地之險也王公君人者觀坎之象知險之不可陵也故設為城郭溝池之險以守其國保其民人是有用險之時其用甚大故贊其大矣哉山河城池設險之大端也若夫尊卑之辨貴賤之分明等威異物采凡以杜絶陵僭限隔上下者皆體險之用也伊川易傳天非險也而人不可升者豈天之大險歟地非險也而山川丘陵豈地之大險歟天地之大尚未離乎坎險之道是以王公内則治教政刑外則城郭溝池皆所以象天地之險以守其國也故彖又曰險之時用大矣哉盖人知用險於小而不知險有大人之事孟子所謂王請大之者是亦孔子大矣哉之意也白雲郭氏易説孟子曰天時不如地利地利不如人和三里之城七里之郭環而攻之而不勝夫環而攻之必有得天時者矣然而不勝者是天時不如地利也城非不髙也池非不深也兵革非不堅利也米粟非不多也委而去之是地利不如人和也故曰域民不以封疆之界固國不以山谿之險威天下不以兵革之利得道者多助失道者寡助寡助之至親戚畔之多助之至天下順之以天下之所順攻親戚之所畔故君子有不戰戰必勝矣孟子魏武侯浮西河而下中流顧謂吴起曰美哉山河之固此魏國之寶也對曰在徳不在險昔三苗氏左洞庭右彭蠡徳義不修禹滅之夏桀之居左河濟右泰華伊闕在其南羊腸在其北脩政不仁湯放之商紂之國左孟門右太行常山在其北大河經其南脩政不徳武王殺之由此觀之在徳不在險若君不脩徳舟中之人皆敵國也武侯曰善通鑑周紀余與資中士友郭允蹈居仁既為蜀鑑一編使凡仕蜀者知古今成敗興衰治亂之蹟以為龜鑑其事備矣復取大易習坎設險之義與孟軻氏天時地利人和之説吴起在徳不在險之對以附諸編末盖山川有自然之險而仁義不足以維持之則險非其險矣夫乾天下之至徤也徳行恒易以知險夫坤天下之至順也徳行恒簡以知阻易簡之中險阻伏焉易簡者何仁義是也故至仁有不仁至義有不義夫能以仁義治其國者國必昌不能以仁義治其國者國必亡是道也推之以保四海可也豈特區區一隅之蜀哉荀卿子曰齊之技擊不可以遇魏之武卒魏之武卒不可以遇秦之鋭士秦之鋭士不可以當威文之節制威文之節制不可以敵湯武之仁義真知言哉嘉熈丁酉重五日文子謹跋昔蕭何入秦丞相府獨收秦圖書備知天下扼塞户口多少强弱處乃用以相漢益信周官訓方刑方等官之設其意為有在矣余向師江陵郭湛溪仕蜀而出遂為江陵寓公毎語余以蜀事而不知其著此書也後十餘年蜀道洶洶余自邇列出鎮長沙名為託裏而其子渉出示此書於是湛溪即世亦幾十牟矣嗟乎揚雄既沒而法言乃行今蜀事如許此書之出豈不足為經理恢拓者之助乎淳祐五年八月十二日古郢别闕

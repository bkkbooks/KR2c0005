body:
  text: 蜀鑑卷二宋郭允蹈撰曹操平張魯取漢中漢獻帝初平二年益州牧劉焉遣張魯襲漢中劉焉在益州隂圖異計沛人張魯自祖父陵以來為五斗米道居於蜀焉乃以魯為督義司馬掩殺漢中太守蘇固斷絶閣道殺害漢使建安五年劉璋襲父焉位魯以璋闇懦不復承順襲别部司馬張修殺之而并其衆魯遂據漢中與璋為敵建安二十年曹操擊張魯自武都入氐氐人塞道遣張郃朱靈攻破之武都今階州同谷武興等地舊有白馬氐據之操自陳倉出散闗至河池屠氐王竇茂衆萬餘人秋七月操至陽平魯遣其弟衛等據陽平闗操遣將夜襲破之魯潰奔巴中操遂入南鄭軍自武都山行千里升降險阻操於是大饗軍士七月至陽平魯使弟衞與將楊昻等據陽平關横山築城十餘里攻之不能拔操乘險夜襲大破之魯潰奔巴中操入南鄭盡得府庫珍寳陽平後漢史注周地圖記曰褒谷西北有古陽平闗其地在今梁州褒城縣西北也又按寰宇記褒城縣有漢陽闗在縣西北漢時所立也先主破夏侯淵於其地水經又注云白馬城亦名濜口有陽平闗在今西縣西縣乃古沔陽去褒城縣七十里邑名遷徙未可知也郡縣志因謂曹操昭烈孔明皆嘗至闗下未嘗越闗則誤矣今大安軍五里亦有陽平闗頗險要然非舊迹也十二月操留夏侯淵張郃守漢中操之留淵郃也以雞肋示外人外人莫察主簿楊修獨曰夫雞肋棄之如可惜食之無所得也論曰曹操芟夷羣雄偽定一時再入漢中而不能下殆強弩之末非真不可向也抑天留以遺昭烈孔明使萬世之三綱頼以不冺耶昭烈君臣由江道入蜀建安十六年昭烈自荆州將數萬人入蜀至江州北由墊江水詣涪昭烈帝在荆州三顧諸葛亮於草廬問以計策亮曰荆州北據漢沔利盡南海東連吳會西通巴蜀此用武之國而其主不能守此殆天所以資將軍將軍豈有意乎益州險塞沃野千里天府之土髙祖因之以成帝業劉璋暗弱張魯在北民殷國富而不知存䘏智能之士思得明君將軍既帝室之胄信義著於四海㧾攬英雄思賢如渇若跨有荆益保其巖阻西和諸戎南撫夷越天下有變則命一上將將荆州之軍以向宛洛將軍身率益州之衆出於秦川百姓孰敢不簞食壺漿以迎將軍者乎誠如是則覇業可成漢室可興矣昭烈既破曹操張松説璋遣法正迎昭烈於荆州法正隂勸昭烈取益州昭烈疑未决龎統復賛之昭烈乃留諸葛亮守荆州以趙雲領留營司馬昭烈將步卒數萬人入益州自江州北由墊江水詣涪去成都三百六十里璋率步騎三萬人往會之歡飲百餘日按昭烈自今重慶府入合州江路上水至涪即今綿州唐乾符間王助綿州富樂山碑云昭烈入蜀劉璋延之此山望見蜀之富盛飲食樂甚故得名璋推昭烈為大司馬使擊張魯昭烈至葭萌璋增昭烈兵厚加資給使擊張魯又令督白水軍璋還成都昭烈北到葭萌未即討魯白水軍按後漢史注公孫述將侯丹開白水関城西南有水闗葭萌在今利州昭烈自葭萌襲蜀進據涪城劉璋斬張松昭烈大怒召白水軍督楊懐髙沛責以無禮斬之勒兵徑至闗頭并其兵遂進據涪城涪城今綿州建安十八年昭烈圍雒城雒城今雒縣建安十九年諸葛亮留闗羽守荆州遂與張飛趙雲沂流克巴東至江州破巴郡太守顔嚴生獲之分遣趙雲從外水定江陽犍為飛定巴西徳陽法正與劉璋書曰今張益徳數萬之衆已定巴東入犍為界分平資中徳陽三道並進將何以禦之又魚復與闗頭實為益州禍福之門今二門悉開數道並進已入心腹愚以為可圖變化以保尊門秦滅巴置巴郡治江州江州縣名今重慶府巴縣是也劉焉分巴為三墊江已上為巴西治安漢今果州墊江以下為巴東治江州墊江今合州是也江陽今瀘州犍為今資榮嘉眉等地徳陽今遂寜府趙雲自外水至瀘州分定資中嘉眉等地張飛自重慶入合州定遂寜果州等地今按法正稱益徳入犍為界分平資中徳陽時正在雒城與璋書非能遥度於千里之外者飛自墊江上未嘗入犍為資中也昭烈進圍成都劉璋出降雒城潰進圍成都諸葛亮張飛趙雲引兵來會馬超自武都宻書請降昭烈令引兵屯城北城中震怖圍城數十日璋遂出降吳蜀分荆州建安二十年闗羽屯江陵呉孫權遣諸葛瑾求荆州諸郡昭烈不許吕䝉取長沙桂陽三郡零陵太守郝普固守權令諸葛瑾從備求荆州諸郡昭烈不許曰吾方圖凉州凉州定乃盡以荆州相與耳權曰此假而不反欲以虛辭引歲者也遂置長沙零陵桂陽三郡長吏闗羽盡逐之權遣吕䝉督兵二萬以取三郡長沙桂陽皆望風歸服惟零陵太守郝普城守不降長沙在今潭州零陵在今永州桂陽在今郴州昭烈至公安遣闗羽至益陽爭三郡呉孫權進住陸口魯肅屯益陽以拒羽郝普以零陵降吕䝉權遣書召吕䝉舎零陵急還助魯肅䝉得書秘之夜召諸將授以方畧晨當攻零陵遣客語郝普以昭烈在漢中闗羽在南郡無外援可恃普懼出降䝉即日引軍赴益陽公安在今江陵府陸口在今鄂州蒲圻縣寰宇記有孫權城益陽在今潭州益陽縣寰宇記云有魯肅城常徳府沅江縣有闗羽屯兵之處名曰闗州沅江亦益陽縣境魯肅闗羽㑹語於此昭烈求和於吳遂分荆州以湘水為界長沙江夏桂陽以東屬吳南郡零陵武陵以西屬漢昭烈聞曹操攻漢中遣使通好於權遂中分荆州江夏在今鄂州南郡今江陵府武陵今常徳府論曰荆州首呉尾蜀據腹心之會合二長以向中原可也跨有荆益保其巖阻次也若中分而與吳共之則吳可以攻而蜀不可以守公孫述之困於夷陵是已惜哉昭烈君臣奮興之晩而三分天下僅有區區之一隅也昭烈取漢中建安二十一年張飛大破張郃軍於宕渠曹操既定漢中留夏侯淵張郃守之黄權言於昭烈曰若失漢中則三巴不振此為割蜀之股臂也操使張郃督諸軍狥三巴欲徙其民於漢中進軍宕渠巴西太守張飛與郃相拒五十餘日飛襲擊郃大破之郃走還南鄭建安二十二年昭烈率諸將進兵漢中遣張飛馬超吳蘭等屯下辨曹洪拒之法正説昭烈曰曹操一舉而降張魯定漢中不因此以圖巴蜀必有内憂故耳今舉衆取漢中必可克之克之之日廣農積穀觀釁伺隙上可以傾覆冦敵中可以廣拓境土下可以固守要害此不可失也昭烈從之下辨今成州同谷縣建安二十三年魏曹洪及吳蘭戰於固山蘭敗死之洪將擊吳蘭張飛屯固山聲言欲斷軍後衆議狐疑曹休曰賊實斷道者當伏兵潜行今乃先張聲勢此其不能明矣宜乗其未集促擊蘭蘭破飛自走矣洪從之進擊破蘭殺之張飛馬超走固山未詳昭烈屯陽平闗夏侯淵張郃徐晃等與之相拒昭烈遣陳式等絶馬鳴閣道徐晃擊破之張郃屯廣石昭烈攻之不能克急書發益州兵諸葛亮以問楊洪洪曰漢中益州咽喉存亡之機會若無漢中則無蜀矣此家門之禍也男子當戰女子當運發兵何疑馬鳴閣寰宇記曰在今利州昭化縣按蜀志曹操曰此閣道乃漢中之險要咽喉按此恐非昭化也廣石陽平闗西有礦石闗建安二十四年昭烈自陽平破夏侯淵於定軍山斬淵首昭烈與夏侯淵相拒踰年昭烈自陽平南渡沔水縁山稍前營於定軍興勢淵引兵爭之法正曰可擊矣遂使黄忠乗高鼓譟攻斬淵及趙顒張郃引軍還陽平明日昭烈欲渡漢水攻郃諸將以衆寡不敵依水為陳以拒之郭淮謂郃曰不如逺水為陳引而致之半濟而後擊之可破也既陳昭烈疑不渡淮遂固守定軍山在今興元府西縣興勢在今洋州興道縣有興勢山三月曹操自長安出斜谷至漢中趙雲破其軍於漢水操自長安出斜谷軍遮要以臨漢中昭烈曰曹操雖來無能為也我必有漢川矣乃歛衆拒險終不交鋒操運米北山下黄忠引兵欲取之過期不還趙雲將數十騎出營視之值操揚兵大出雲猝與相遇遂前突其陳且鬬且却魏兵散而復合追至營下雲入營更大開門偃旗息鼓魏兵疑雲有伏引兵還雲擂鼓震天惟以勁弩於後射魏兵魏兵驚駭墮漢水中死者甚多明旦昭烈自來至雲營視昨戰處曰子龍一身都是膽也遮要興元記云曹操城在縣西北十二里斜谷口遮要置軍處夏五月操與漢中諸軍還長安操後嘗語人曰南鄭直為天獄中斜谷道為五百里石穴耳昭烈遣孟達從秭歸北攻房陵下之遣劉封乗沔水與達會攻上庸太守申耽舉郡降以耽為上庸太守耽弟儀為西城太守定漢中地秭歸今歸州房陵今房州上庸西城皆今金州地即漢地理志漢中諸郡也秋七月昭烈即漢中王位於沔陽以魏延領漢中太守沔陽今興元府西縣孫權襲荆州建安二十四年闗公自江陵攻樊大破于禁龎惪於漢水闗公使糜芳守江陵傅士仁守公安自率衆攻曹仁於樊仁使于禁龎惪等屯樊北八月大霖雨漢水溢平地數丈于禁等七軍皆没禁等登髙避水公乗大船就攻之于禁遂降殺龎惪樊城在今襄陽府公圍樊城公急攻樊城城得水往往崩壊衆皆洶懼滿寵謂曹仁曰今若遁去洪河以南非復國家有也乃殺白馬為盟同心固守公乗船臨城立圍數重外内斷絶公又遣别將圍吕常於襄陽荆州刺史胡修南陽太守傅方皆降於公公威震華夏操議徙都以避其銳吕䝉襲江陵取之闗公退走死於章鄉孫權遂定荆州吕䝉屯陸口勸孫權取蜀全據長江䝉遂稱病篤權檄䝉至蕪湖隂與圖計遣陸遜代䝉屯陸口遜深自謙抑為盡忠自託之意於公公意大安稍撤兵以赴樊公得于禁等人馬數萬糧食乏絶擅取權湘闗米權聞之遂發兵襲公以吕䝉為大都督又上表曹操請討蜀自效公聞之猶豫不能去㑹傅方胡修皆死公遂撤樊城之圍吕䝉至尋陽公所置江陵守麋芳公安守傅士仁皆降䝉入江陵撫其將士封府庫以俟權至公聞南郡破即走南還權至江陵荆州將吏悉皆歸附獨治中從事潘濬稱疾不見權輿致之即遣濬平武陵斬其從事樊佃以陸遜領宜都太守闗公西保麥城權命朱然斷其徑路得公及其子平於章鄉害之遂定荆州陸口今鄂州蒲圻縣蕪湖今太平州尋陽今江州武陵今鼎州宜都今峽州宜都縣麥城在沮水上水經注沮水又逕麥城西荆州記云麥城東有驢城西有磨城伍子胥造此二城攻麥城俗諺云東驢西磨麥自破章鄉在漳水上水經注漳水出臨沮縣東荆山又東過章鄉南荆州記云即楚交城古老相傳楚昭王所築並在今荆門軍當陽縣蜀失漢中三郡蜀漢章武元年孟達以上庸降魏將軍孟達屯上庸與劉封不協封侵凌之達率部曲四千餘家來降魏主丕合房陵上庸西城三郡為新城以達領新城太守委以西南之任行軍長史劉􅁮曰達有茍得之心而恃才好術新城與劉孫接連若有變態為國生患達與夏侯尚等共襲劉封上庸太守申耽叛封降魏封破走還成都丞相亮勸昭烈除之遂賜封死達後入城登白塞嘆曰劉封申耽據金城千里而失之乎上庸西城今荆州縣房陵今房州昭烈攻荆州不利章武元年昭烈自率諸軍擊孫權張飛自閬中會江州飛將張達范疆殺飛以奔孫權章武三年昭烈至秭歸遣黄權督江北諸軍昭烈屯於夷道猇亭昭烈自秭歸將進擊吳黄權諫曰吳人悍戰而水軍沿流進易退難請為先驅以當敵昭烈不從以權為鎮北將軍自率諸將自江南縁山截嶺軍於夷道猇亭吳將皆欲迎擊之陸遜曰蜀軍縁山行軍勢不得展自當罷於木石之間徐制其敝矣漢人自佷山通武陵使馬良以金銀賜五溪諸蠻夷授以官爵猇亭在今峽州夷陵縣蹤跡夷滅已不可考佷山在今峽州長揚縣武陵今常徳府昭烈敗績於猇亭漢人自巫峽建平連營至夷陵界立數十屯以馮習為大督張南為前部督自正月與吳相拒至六月不决陸遜上疏於孫權曰夷陵要害國之闗限雖為易得亦復易失失之非徒損一郡之地荆州可憂今敵師捨船就步處處結營察其布置必無他變諸將先進攻一營不利遜曰吾已曉破之之術乃敇各持一把茅以火攻㧞之通率諸軍同時俱攻斬張南馮習等首破其四十餘營昭烈升馬鞍山陳兵自繞遜督促諸軍四靣蹙之死者萬數昭烈夜遁驛人自擔燒鐃鎧斷後僅得入白帝城傅彤為後殿死之馬良亦死於五溪黄權在江北率其衆降魏建平在今歸州馬鞍山在猇亭夷陵志云夷陵要害南有石鼻馬鞍猇亭寰宇記云今歸州巴東縣有石門山山有石徑深若重門劉主為陸遜所破燒鎧斷道然後得免論曰闗雲長以萬人之敵卧䕶荆州昭烈君臣以為長城而堕吕䝉之詭計昭烈勇於一决以爭荆州君臣於是俱失之矣或謂是役也昭烈不自將而孔明長嘯以下荆州則何如曰非孔明之志也孔明固謂孫權可與為援而不可圖又謂國賊曹操非孫權又謂法孝直在必能諫上此行孔明葢亦難之矣曰然則荆州遂可置之度外乎曰向使雲長自江陵出襄陽而益得黄權有一人焉為居守之計則固可震撼中原而無後顧之憂矣雲長既死雖孔明亦末如之何也巴西太守閻芝遣馬忠將五千人至永安章武四年諸葛亮至永安昭烈崩於永安永安今䕫州奉節縣蜀鑑卷二

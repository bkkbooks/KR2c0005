body:
  text: 蜀鑑卷五宋郭允蹈撰江左不用蜀晉咸康元年詔建威将軍司馬勲将兵安集漢中漢主夀撃敗之夀遂置漢中守宰城南鄭而還永和三年荆州刺史桓温伐蜀取之蜀故将鄧定隗文等反入據成都征虜将軍楊謙棄涪城走保德陽涪城今綿州德陽今遂寧府永和四年益州刺史周撫擊范賁斬之益州平賁范艮生之子隗文等立為帝梁州刺史司馬勲出駱谷破趙長城戍壁於懸鈎趙主石虎死國亂雍州豪傑遣使告晉司馬勲帥衆赴之勲出駱谷破趙長城戍壁於懸鈎去長安二百里使治中劉煥攻長安斬京兆太守劉季離又㧞賀城三輔豪傑多殺守令以應勲凡三十餘壁衆五萬餘人水經注渭水之東駱谷之水出其南山洛谷水北流逕長城西司馬勲釋懸鈎拔宛城殺趙南陽太守袁景復還梁州宛城南陽縣永和十年桓温大舉伐秦遣司馬勲出子午道温統歩騎四萬發江陵水軍自襄陽入均口至南鄉歩兵自浙川趨武闗子午道從杜陵徑漢中均口南鄉浙川皆在今鄧州武闗今商州春秋左傳哀公四年少習即武闗也司馬勲掠秦西鄙桓温别将進擊青泥城破之凉秦州刺史王擢攻陳倉以應温秦主健遣太子萇等帥衆五萬軍於嶢栁以拒温夏四月己亥温與秦兵戰於藍田大敗之桓冲又敗秦丞相雄於白鹿原温至㶚上秦太子萇退屯河南秦主健與老弱六千固守長安小城悉發精兵與萇合兵以拒溫三輔郡縣皆来降耆老有垂泣者曰不圖今日復見官軍泥水水經注北厯嶢栁城魏置青泥軍於城内故謂之青泥城即嶢栁闗亦名藍田闗白鹿原三秦記云周平王東遷之後有白鹿遊此因得名並在京兆府藍田縣秦丞相雄帥騎七千襲司馬勲於子午谷破之勲退屯女媧堡女媧堡寰宇記云藍田山有女媧氏谷或云今金州有女媧山非也秦丞相雄擊司馬勲於陳倉勲奔漢中王猛謂温曰公不逺數千里深入敵境長安咫尺而不度㶚水百姓未知公心是以不至温兵不利温指秦麥以為糧既而秦人芟麥清野以待之温軍乏食六月徙闗中三千餘戸而歸司馬勲自陳倉中奔漢中凉秦州刺史王擢亦奔畧陽㶚水出京兆府萬年縣㶚城秦繆公所築哀帝興寕三年益州刺史周撫卒以其子犍為太守楚代之撫在益州三十餘年甚有威惠梁州刺史司馬勲舉兵反圍周楚於成都大司馬温遣朱序救之勲常有據蜀之志憚周撫不敢發及撫卒遂舉兵反引兵入劍閣圍周楚於成都海西公太和元年荆州刺史桓豁遣桓羆攻南鄭討司馬勲朱序周楚擊司馬勲獲之大司馬温斬勲傳首建康簡文帝咸安元年益州刺史周楚卒以寜州刺史周仲孫為益州刺史大司馬温以梁益多㓂周氏世有威名乃以周仲孫代楚守蜀孝武帝寜康元年秋七月大司馬温薨論曰晉室南渡中原非復晉有猶曰五胡崛起力未易支也若夫吴蜀脣齒之邦孫劉連衡用之以抗曹魏足矣桓温之取蜀也擇忠信之長嚴毅之帥藩豢其生齒教誨其人民招集其流離驅逐其蟊賊庶㡬積年之汙俗咸與惟新然後命一将以出秦川而自将以向宛洛孔明之志庶㡬少伸矣哉軍至㶚上徒出而歸司馬勲犄角之師曾何足仗西土之憂未艾也温死而苻堅得蜀矣堅氷之漸信乎苻堅取蜀晉寜康元年秦王堅使王統朱彤帥卒二萬出漢川毛當徐成帥卒三萬出劍門入㓂梁益梁州刺史楊亮帥巴獠萬餘拒之戰於青谷亮兵敗奔西城彤遂拔漢中徐成攻劍門克之青谷未詳西城今金州劍門今隆慶府秦梁州刺史楊安進攻梓潼太守周虓守涪城母為朱彤所獲虓遂降於安安克梓潼荆州刺史桓豁遣江夏相竺瑶救梁益瑶聞廣漢太守趙長死引兵退益州刺史周仲孫勒兵至綿竹帥騎五千奔於南中秦遂取梁益二州卭笮夜郎皆附於秦仲孫坐失守免官秦苻堅以楊安為益州牧鎮成都毛當為梁州刺史鎮漢中姚萇為寜州刺史屯墊江王統為南秦州刺史鎮仇池墊江今合州仇池今成州桓冲以毛虎生為益州刺史領建平太守以虎生子球為梓潼太守虎生與球伐秦至巴西以糧乏退屯巴東建平今歸州巴西治今閬州巴東治今䕫州寜康二年蜀人張育楊光起兵擊秦遣使来請兵秦王堅遣鄧羌討之益州刺史竺瑶威逺将軍桓石䖍帥衆二萬及墊江姚萇兵敗退屯五城瑶石䖍屯巴東五城今潼州府中江縣晉屬廣漢郡縣有五城山故名臧宫破延岑亦於此地張育與巴獠酋帥張重尹萬等五萬餘人進圍成都秦楊安鄧羌襲育敗之八月鄧羌敗晉兵於涪西楊安敗張重尹萬於成都南重死斬首二萬三千級鄧羌擊張育楊光於綿竹皆斬之益州復入於秦苻堅雖得蜀而䕫路未嘗失所以晉不乆復得之也晉孝武太元三年秦梁州刺史韋鍾圍魏興太守吉挹於西城秦既得蜀遣長樂公丕等攻襄陽明年拔之韋鍾遂圍西城魏興在今金州治西城縣太元四年右将軍毛虎生帥衆三萬擊巴中以救魏興秦将張紹等敗之虎生退屯巴東韋鍾拔魏興吉挹死之寰宇記吉挹為梁州督為苻堅所敗於縣南九里依山築城攻圍不下名吉挹城巴中今䕫路巴東今䕫州太元六年秦王堅以裴元畧為巴西梓潼郡太守使宻具舟師穆帝永和三年梓潼郡傐置巴西治今綿州苻堅因之太元八年十一月苻堅入㓂大敗於淝水晉復取蜀太元八年夏五月元冲帥衆十萬伐秦遣輔國将軍楊亮攻蜀拔五城進攻涪城秦遣張蚝姚萇救涪城張蚝出斜谷亮引兵還桓冲數伐秦蜀無功而還但拔蜀兩邑五城今潼州府中江縣涪今綿州太元九年梁州刺史楊亮帥衆五萬伐蜀遣巴西太守費統等将水陸兵三萬為前鋒亮屯巴郡秦遣王廣康回拒之巴郡治今重慶府巴縣姚萇擊秦王堅秦益州刺史王廣遣將軍王蚝帥蜀漢之衆三萬北救長安秦梁州刺史潘猛棄漢中奔長安太元十年秦益州刺史王廣以李丕為益州刺史守成都廣帥所部奔還隴西蜀人随之者三萬餘人丕蜀人為江陽太守秦政方亂而蜀人之歸秦者三萬人以夷獠亂其城邑而晉不暇謀也蜀郡太守任權攻拔成都斬秦刺史李丕復取益州以廣州刺史羅友為益州刺史鎮成都裕討譙縱晉安帝元興二年桓𤣥僣位益州刺史毛璩傳檄逺近討之進屯白帝𤣥僣位遣使加璩􅄆騎常侍璩執留𤣥使不受其命𤣥以桓希戍三巴以備之璩傳檄逺近列𤣥罪狀遣建平太守羅述征虜司馬甄季之擊破希等仍率衆次於白帝白帝今䕫州毛修之及馮遷斬𤣥於江陵𤣥以乗輿幸江陵将之漢中屯騎校尉毛修之璩之弟子也誘𤣥入蜀遂與毛祐之費恬擊𤣥益州督護漢嘉人馮遷抽刀斬𤣥乗輿反正於江陵桓振復䧟江陵毛璩遣将攻漢中斬桓希義熈元年毛璩帥衆三萬順流東下討桓振璩遣其弟瑾出外水參軍譙縱反殺毛瑾於涪城璩還成都為縱等所殺毛璩遣其弟瑾瑗出外水參軍譙縱侯暉出涪水蜀人不樂逺征暉至五城水口謀作亂縱為人和謹蜀人愛之共逼縱為主縱不可走投於水引出之共逼縱登輿縱又投地固辭暉縛縱於輿襲毛瑾於涪城殺之璩至畧城聞變奔還成都益州營戸李騰聞城納縱共殺璩及弟瑗又外水今大江也庾仲雍云江州縣對二水口右則涪内水左則蜀外水内外水之所以名也江州縣即今重慶府涪水水經云出廣魏涪縣至小廣魏南入於墊江所謂内水也涪今綿州墊江今合州内水之源委也五城水口在郪縣今中江縣水也中江縣自有一水入於涪即廣漢枝水廣漢郡有沈水臧宫嘗破延岑於此水水經注云江水又東絶綿洛逕五城界至廣都北岸南入於江謂之五城水口此甚誤江水未嘗絶綿洛又逕五城而至廣都涪水亦未嘗逕五城與綿洛初無相干廣都乃在五城之上非下流也舛誤甚矣大抵蜀自後漢以来由廣漢而下涪水多逕五城亦争戰之地今中江縣也義熈二年益州刺史司馬榮期擊譙明子於白帝破之譙縱以弟洪為益州刺史明子為巴州刺史屯白帝劉裕遣龍驤将軍毛修之将兵與司馬榮期等討之修之至宕渠榮期為參軍楊承祖所殺修之退還白帝宕渠宋於墊江置東宕渠郡今合州義熈三年毛修之與漢嘉太守馮遷擊楊承祖斬之馮遷漢嘉人手刃桓𤣥者為鄉郡太守劉裕表襄城太守劉敬宣伐蜀以劉道規為征蜀都督義熈四年劉敬宣與諸将至黄虎譙縱譙道福拒之敬宣引軍還劉敬宣既入峡遣巴東太守温祚以二千人出外水自帥益州刺史鮑陋及將軍文處茂時延祖等由墊江轉戰而前譙縱求救於秦秦王興遣姚賞王敏將兵二萬赴之敬宣軍至黄虎去成都五百里縱遣譙道福悉衆拒險相持六十餘日敬宣不得進食盡軍中疾疫死者大半乃引軍還黄虎在今潼州府通泉縣寰宇記云有黄滸州義熈六年譙縱遣桓謙譙道福㓂荆州荆州刺史劉道規大破之於枝江謙等大陳舟師兼以步騎戰於枝江檀道濟先進䧟陳謙等大敗道規追斬謙枝江今江陵府枝江縣譙道福䧟巴東益州刺史鮑陋卒道福䧟巴東殺守将温祚時延祖巴東今䕫州義熈八年太尉劉裕以朱齡石為益州刺史帥臧熹劉鍾等伐蜀義熈九年六月朱齡石從外水入成都􅆇熹從中水入廣漢裕與齡石宻謀進取曰劉敬宣往年出黄虎無功而退賊謂我今應從外水往而料我當出其不意猶從内水来也如此必以重兵守涪城以備内道若向黄虎正墮其計今以大衆自外水取成都疑兵出内水此制敵之竒也裕慮此聲先馳賊知虚實别有函書封付齡石曰至白帝乃開朱齡石等至白帝發函書曰衆軍悉從外水取成都􅆇熹從中水取廣漢老弱乗髙艦十餘從内水向黄虎於是諸軍倍道兼行外水都江水自江陽南安平模入成都内水涪水自墊江徳陽黄虎上涪中水發源為綿洛湔三水自江陽泝流上富義資中牛鞞上廣漢論曰劉裕之發函書即岑彭自墊江還江州泝都江上武陽之故智也譙道福鎮涪城以備内外譙縱遣侯暉譙詵帥衆萬餘屯平模朱齡石帥諸軍攻克之齡石至平模去成都二百里侯暉譙詵夹岸築城以拒之齡石以天時甚熱欲養鋭息兵劉鍾曰不然賊阻兵守險者懼不敢戰也盡鋭攻之其勢必克若緩兵相守彼知人虚實譙道福以涪軍来我求戰不獲軍食無資二萬餘人悉為蜀虜矣齡石從之諸将以水北城地險兵多欲攻其南城齡石曰今屠南城不足以破北若盡鋭以拔北城則南城不麾自潰矣秋七月攻北城克之斬侯暉譙詵平模今彭山縣譙撫之屯牛鞞譙小茍塞打鼻臧熹擊撫之斬之小茍聞之亦潰牛鞞今簡州陽安縣此中水所經由也打鼻寰宇記彭山縣有鼎鼻山亦名打鼻譙小茍所據也譙縱棄成都朱齡石入成都縱自殺獲譙道福於獠中斬之蜀鑑巻五

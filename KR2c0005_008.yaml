body:
  text: 蜀鑑卷八宋郭允蹈撰孟知祥董璋連兵拒命後唐莊宗同光三年以孟知祥為西川節度使董璋為東川節度使郭崇韜之伐蜀也以孟知祥有薦引舊恩將行言於上曰知祥信厚有謀可為西川帥崇韜素與董璋善蜀平崇韜薦為東川節度使詔以孟知祥為西川節度使紹琛反於蜀魏王繼岌使工部尚書任圜討平之孟知祥討定餘冦平蜀之役紹琛功為多董璋位居下帥東川紹琛不能平㑹郭崇韜誅紹琛謂董璋曰欲復呫囁誰門耶璋懼謝罪魏王繼岌至武連遇敕使諭以令董璋將兵誅朱令德紹琛以不見委大驚俄而璋過不謁紹琛怒自劒州擁兵西還自稱西川節度使詔以任圜討之董璋將兵二萬㑹任圜討紹琛至漢州紹琛逆戰張礪請以羸兵誘之圜從之紹琛大敗閉城不出漢州無城槧樹木為柵圜攻焚之紹琛戰敗奔綿竹追擒之蜀中羣盜猶未息知祥擇亷吏使治州縣與民更始遣趙廷隱將兵分討羣盜悉誅之天成三年遣李仁矩如兩川詔令西川獻一百萬緡東川五十萬緡皆辭以軍用不足西川獻五十萬緡東川獻十萬緡以李仁矩為保寧節度使夏魯竒為武信節度使詔割果閬二州以仁矩為節度使安重誨之謀也又詔綿州刺史武䖍裕將兵赴治又使武信節度使夏魯竒治遂州城隍繕甲益兵戍之董璋孟知祥大懼璋素與知祥有隙至是結為婚姻謀併力以拒朝廷長興元年董璋築寨劒門與孟知祥上表拒命董璋遣兵築七寨于劒門孟知祥遣趙季良詣璋修好還言璋貪殘好勝終必為患知祥與璋上表言兩川聞朝廷於閬中進節綿遂益兵無不憂恐詔書慰諭之璋表武虔裕兼行軍司馬囚之府廷又閲集民兵皆剪髮黥面復於劒門北置永定關布列烽火兩川節度使董璋孟知祥連兵反璋擊閬州知祥遣李仁罕等攻遂州侯𢎞實㑹璋攻閬州知祥謀於趙季良請以東川先取遂閬然後併兵守劒門知祥從之遂使約董璋同舉兵董璋陷閬州殺李仁矩詔削董璋官爵遣石敬塘討之以孟知祥兼供饋使石敬塘為招討使夏魯竒副之孟知祥遣李仁罕圍遂州夏魯竒嬰城固守孟知祥命髙敬柔帥資州義軍二萬築長城環之魯竒遣馬軍都指揮使康文通出戰文通以其衆降於仁罕董璋攻利州不克知祥聞之曰比破閬中正欲徑取利州其帥不武必望風遁去吾獲倉廩據漫天之險北軍終不能西救武信今董公僻處閬州還弃劒閣非計也漫天山名在利州孟知祥遣張武將水軍趨䕫州武至渝州刺史張環降之遂取瀘州遣朱偓分兵趨黔涪削孟知祥官爵并討之石敬塘襲劒門克之王𢎞贄等破劒州退保劒門石敬塘入大散關王𢎞贄等引兵出人頭山後過劒門之南殺東川兵三千人據而守之𢎞贄等破劒州而大軍不繼乃焚其廬舍取其資糧還保劒門人頭山在利州昭化西孟知祥遣李肇據劒州趙廷隱自遂州將兵㑹屯劒州李筠向龍州董璋將兵屯木馬寨知祥聞劒門失守大懼曰董公果誤我矣遣李肇將兵五千赴之戒之曰爾倍道兼行先據劒州北軍無能為也又遣使指遂州令趙廷隱將萬人㑹屯劒州又遣李筠將兵四千趨龍州守要害董璋自閬州將兩川兵屯木馬寨先是西川牙內指揮使龎福誠謝鍠屯來蘇村聞劒門失守相謂曰使北軍更得劒州則二蜀勢危矣遽引部兵千餘人間道趨劒州始至官軍萬餘人自北山大下㑹日暮二人謀曰衆寡不敵逮明則吾屬無遺矣福誠夜引兵數百升北山大譟於官軍營後鍠帥餘衆操短兵自其前急擊之官軍大驚空營遁去復保劒門十餘日不出孟知祥聞之喜曰吾始謂𢎞贄等克劒門徑據劒州堅守其城或引兵直趨梓州董公必弃閬州奔還我軍失援亦須解遂州之圍如此則內外受敵兩川震動勢可憂危今乃焚毁劒州運糧東歸劒門頓兵不進吾事濟矣木馬寨距劒州十里來蘇近劒門小路也劒門南清疆對與大路合王𢎞贄等遣兵分道向文州官軍將襲龍州為西川潘福超等所敗董璋遣前陵州刺史王暉將兵三千㑹李肇等分屯劒州南山石敬塘進屯劒州不利退屯劒門敬塘屯劒州北山趙廷隱陳兵于牙城後山李肇王暉陳于河橋敬塘引步兵進擊廷隱廷隱擇善射者五百人伏敬塘歸路按甲待之矛矟欲相及乃揚旗鼓譟擊之斬百餘人敬塘又使騎兵衝河橋李肇以强弩射之騎兵不能進薄暮敬塘引去廷隱引兵躡之與伏兵合擊敗之敬塘還屯劒門詔遣安重誨督征蜀諸軍石敬塘本不欲西征及重誨西出乃纍表論奏以為蜀可伐明宗頗然之長興二年孟知祥兵陷遂州守將夏魯竒死之魯竒有廟在遂寧府召安重誨還石敬塘引兵遁歸兩川兵追之陷利州石敬塘以遂閬既降糧運不繼燒營北歸軍前以告孟知祥知祥匿其書謂趙季良曰北軍漸進奈何季良曰不過綿州必遁知祥問其故曰我逸彼勞彼懸軍千里糧盡能無遁乎知祥大笑以書示之兩川兵追敬塘至利州李彥琦弃城走兩川兵入利州知祥以趙廷隱為昭武留後遣兩川將吏還諭本鎮安重誨以讒誅遣西川進奏官蘇願果州軍將劉澄各還本道諭以安重誨專命興兵今已伏辜孟知祥遣使告董璋欲與之俱上表謝璋怒曰孟公親戚皆完璋已族滅尚何謝為由是復為怨敵孟知祥遣李肇守利州昭武留後趙廷隱請兵於孟知祥欲以取興元及秦鳳知祥不許廷隱以頃在劍州與李肇同功願以昭武讓肇知祥褒諭不許廷隱三讓知祥從之孟知祥圖蜀明宗天成元年孟知祥增置營兵知祥隂有據蜀之志閲庫中得鎧甲二十萬置左右牙等兵十六營凡萬六千人營於牙城內外又置左右飛棹兵六營凡六千人分戍濱江諸州習水戰以備䕫峽以趙季良為三川制置轉運使李嚴為西川都監郭崇韜率蜀中富民輸犒賞錢五百萬緡晝夜督責有自殺者給軍之餘猶二百萬緡至是任圜判三司知成都富饒遣季良為三川都轉運使蜀人欲皆不與知祥曰府庫他人所聚輸之可也州縣租稅以贍鎮兵決不可得季良但發庫物不敢復言制置轉運職事矣安重誨以知祥及東川節度使董璋皆據險擁兵又知祥乃莊宗近姻隂欲圖之李嚴自請為西川監軍天成二年孟知祥殺李嚴高季興襲取䕫州季興請䕫忠萬州為屬郡唐主許之又請自除刺史不許季興輒遣兵突入䕫據之又襲涪州不克魏王繼岌遣押牙韓珙等部送蜀珍貨四十萬浮江而下季興殺而掠之朝廷詰之對曰欲知覆溺之故自冝按問水神帝以劉訓為南面招討使東川節度使董璋將蜀兵下峽㑹湖南兵三面進攻以趙季良為西川副使從孟知祥之請也唐蜀兵敗荆南軍取䕫忠萬州孟知祥發民丁二十萬修成都城天成三年孟知祥置三場於漢州𣙜鹽孟知祥屢與董璋爭鹽利璋誘商旅販東川鹽入西川知祥患之乃於漢州置三場重征之嵗得錢七萬緡商旅不復之東川詔發西川兵戍䕫州孟知祥請免之毛重威將三千人往知祥奏䕫忠萬三州已平請召戍兵還以省饋運帝不許重威帥其衆鼓譟逃歸帝命按其罪知祥請而免之長興元年孟知祥割雲安鹽監𨽻西川知祥纍表請割雲安等十三鹽監𨽻西川以鹽直贍寧江屯兵許之長興二年孟知祥兵陷忠萬䕫州知祥以李仁罕為峽路招討使將水軍東略地至䕫州寧江節度使安崇阮弃鎮自均房逃歸孟知祥擊東川全有蜀地長興三年董璋襲西川克漢州董璋㑹諸將謀襲成都皆曰必克前陵州刺史王暉曰劒南萬里成都為大師出無名必無成功璋不從孟知祥遣潘仁嗣將三千人詣漢州詗之璋入境破白楊林鎮潘仁嗣與戰于赤水大敗為璋所擒璋遂克漢州孟知祥遣趙廷隱拒董璋知祥出與璋戰璋遁走廷隱將三萬人拒之知祥留趙季良守成都自將兵八千趨漢州至彌牟鎮趙廷隱陳於鎮北遲明廷隱陳於雞蹤橋璋望西川兵盛退陳於武侯廟下璋帳下驍卒大譟曰日中曝我輩何為何不速戰璋乃上馬前鋒始交東川張守進降於知祥言璋兵盡此無復後繼當急擊之知祥登髙冡督戰毛重威李敬塘守雞蹤橋趙廷隱三戰不利知祥懼以馬箠指後陳張公鐸帥衆大呼而進東川兵大敗死者數千人擒其親兵八十餘人璋拊膺曰吾何依乎與數騎遁去餘衆七千人降知祥引兵追璋至五侯津趙廷隱追至赤水赤水在漢州東彌牟鎮有武侯八陳圖雞蹤橋在彌牟鎮五侯津在瀰濛水李膺益州記云昔有人姓侯兄弟五人住此水側皆武勇殷富俗人呼為五侯水董璋歸東川王暉殺董璋降于知祥知祥入梓州遂定東川長興四年以孟知祥為東川節度使蜀王閔帝應順元年孟知祥稱帝唐山南節度使張䖍釗武定節度使孫漢韶以兩鎮降遂有山南洋川之地乃命李肇將五千人還利州張業將兵一萬屯大漫天以迎之孟昶得階成秦鳳四州昶明德十年漢秦州節度使何重建以秦州降據五代史蜀檮杌亦云階州刺史王君懷以州降據通鑑昶遣孫漢韶攻鳳州下之遣何重建攻成州克之攻鳳州據五代史云克成州據蜀檮杌於是盡有王衍故地蜀檮杌云遣李廷圭非孫漢韶也今從之又通鑑書此殊略周世宗伐蜀取四州周世宗顯德二年詔遣鳳翔節度使王景伐蜀王景拔黃牛寨蜀將趙季札遁歸蜀王昶斬之世宗常憤中國日蹙有削平天下之志㑹秦州民夷有獻䇿請恢復舊疆者帝納其言蜀主聞之遣趙季札按視邊備季札以文武才略自任使還請自行世宗遣王景伐蜀自散關趨秦州王景拔黃牛寨季札至德陽聞周師入境懼不敢進單騎馳還成都蜀主怒斬之黃牛寨在鳳州東州去興趙原四十里原去寨十五里王景敗蜀師于黃花谷蜀師皆潰取秦階成州宰相以景等久無功饋運不繼固請罷兵帝命我太祖皇帝往視之還言秦鳳可取之狀帝從之蜀李廷圭遣先鋒都指揮使李進據馬嶺寨又遣竒兵出斜谷屯白澗又分兵出鳳州之北唐倉鎮及黃花谷絶周糧道閏月王景遣禆將張建雄將兵二千抵黃花又遣千人趨唐倉扼蜀歸路蜀染院使王巒將兵出唐倉與建雄戰於黃花蜀兵敗奔唐倉遇周兵又敗虜巒及其將士三千人馬嶺白澗兵皆潰李廷圭髙彥儔等退保青泥嶺蜀雄武節度使韓繼勳弃秦州奔還成都斜谷援兵亦潰成階二州皆降蜀人震恐馬嶺寨在鳳州之西去州三十五里白澗鎮在鳳州唐倉鎮及黃花谷在北川水上水經注北川水出北洛箋山南流徑唐倉城下黃花谷水亦出此山寰宇記云唐倉鎮入蜀要路魏將唐倉於此栅而立倉廪故謂之唐倉栅廢黃花縣在今鳳州梁泉縣王景克鳳州取之王景等圍鳳州韓通分兵城固鎮以絶蜀之援兵遂克鳳州擒其節度使王環及都監趙崇浦等將士五千人崇溥不食而死制曲赦秦鳳階成境內所獲蜀將士詔曰其四州之民二稅徵科之外凡蜀人所立諸色科徭悉罷之固鎮屬鳳州論曰王建孟知祥乘世之亂盜有土宇塵汙華岷論蜀者羞稱焉然建之入蜀也十有七年始僞定蜀地知祥之據蜀也奕世而后能有階成秦鳳四州襲而取之可謂難矣及其末也兵不戰而自潰褒斜劒閣如涉無人之境焉果何足恃哉易曰天險不可升也地險山川邱陵也王公設險以守其國所謂設險者以人為險也故曰固國不以山溪之險蓋士之賢於長城也久矣區區之蜀何足道哉本朝王全斌下蜀太祖皇帝乾德二年以王全斌為鳳州路都部署劉光義為歸州路副都部署分道伐蜀蜀知樞密院王昭逺說蜀主遣使并門發兵南下而蜀自黃花子午谷出兵應之使中原受敵以窺關右之地蜀主遣趙彥韜等齎蠟彈帛書遺北漢主劉鈞約兵濟河同舉入冦彥韜至都下取其書以獻上笑曰吾西討有名矣翰林醫官穆昭嗣初事髙季興侍上問以蜀中地理昭嗣曰荆南即西川江南廣南都㑹也今已克此則水陸皆可趨蜀上笑於是命全斌等分道進討上出畫圖謂全斌等曰西川可取否禆將史延德前奏曰西川在天上固不可到在地上即平矣蜀主聞有北師以王昭逺等帥兵拒戰十二月王全斌取興州全斌等攻拔乾渠渡萬仞燕子等寨遂取興州敗蜀兵七千人獲軍糧四十餘萬石刺史藍思綰退保西縣全斌又攻石圌魚關白水閣二十餘寨皆拔之蜀山南節度使韓保正弃城走史延德入興元追獲之蜀軍退保葭萌保正聞興州破遂弃山南退保西縣史延德以先鋒至保正懦懼不敢出遣兵數萬人依山背城結陳自固延德擊走之追擒保正及其副李進獲糧三十餘萬斛禆將崔彥進與康延澤等逐北過三泉遂至嘉州殺掠甚衆蜀軍燒絶棧道退保葭萌劉光義入䕫州蜀守將髙彥儔死之光義等連破松木三㑹巫山等寨殺其將南光海等生擒戰棹都指揮使袁德宏等奪戰艦二百餘艘又斬獲水軍六千餘衆初蜀於䕫州鎖江為浮梁上設敵柵三重夾江列炮具光義等行上出地圖指其處謂曰泝流至此切勿以舟師爭勝當先遣步騎潜擊之俟其稍却乃以戰棹夾攻可必敗也光義等未至鎖江三十里許捨舟前奪浮梁復引舟而上遂屯兵白帝廟西守將髙彥儔謂其副趙崇濟武守謙曰北軍涉險逺來利在速戰冝堅壁待之守謙曰冦據吾城下而不擊又何待也遂領千人以出光義亦遣張廷翰等引兵與守謙戰於猪頭鋪守謙敗走廷翰等乘勢登其城彥儔整衆出鬬而廷翰等已入其城中矣彥儔力戰不勝身被十餘槍左右皆散去彥儔奔歸府第判官羅濟勸彥儔歸蜀彥儔曰我昔已失秦川今復不能守此縱人主不殺我我何面目見蜀人乎解符印授濟反拒其户整衣冠再拜登樓縱火自焚王全斌入利州全斌以蜀人斷棧大軍不得進議取羅川路入蜀康延澤潜謂崔彥進曰羅川路隘難並進不如分兵修棧約㑹大軍於深渡可也彥進遣白全斌許之不數日閣道成遂進擊金山寨又破小漫天寨而全斌亦以大軍由羅川至深渡與彥進㑹蜀人依江而陳彥進遣張萬友等擊之奪其橋㑹暮夜蜀人退保大漫天寨明日彥進延澤萬友分兵三道擊之蜀人悉其精鋭來拒又大破之乘勝拔其寨王昭逺趙崇韜引兵來戰三敗追奔至利州地昭逺等遁去渡桔柏津焚浮梁退保劒門全斌等入利州獲軍糧八十萬斛乾德三月正月王全斌等入劒州蜀主聞王昭逺等敗甚懼乃募兵守劒門命太子𤣥哲為元帥王全斌等自利州趨劒門次益光㑹議曰劒門天險古稱一夫荷戈萬夫莫當諸君冝求進取之䇿軍頭向韜曰得降卒言益光江東越大山數重有峽名來蘇蜀人于江西置柵對江可渡自此出劒門南二十里青彊店與官道合若大軍行此路則劒門之險不足恃也全斌等欲赴之康延澤曰蜀人數戰數敗膽氣奪矣可急攻而下且來蘇狹徑主帥不可自行但可遣一偏將往耳若扺青彊北與大軍夾擊劒門昭逺等必成擒矣全斌等然之命史延德分兵趨來蘇跨江為浮梁以濟蜀人見之弃寨而走延德遂至青彊王昭逺等引兵退駐漢源坡留其偏將守劒門全斌等以鋭兵奮擊破之及漢源趙崇韜布陳䇿馬先登昭逺據胡牀不能起崇韜戰敗猶手斬數人乃被執昭逺免胄棄甲而逃全斌等遂取劒州昭逺為追騎所獲太子𤣥哲等皆嬉逰不恤軍政至綿州聞劒門已破棄軍西還王全斌次魏城蜀主孟昶以表請降全斌等入成都蜀老將石奉頵請聚兵堅守蜀主嘆曰吾父子以豐衣美食養士四十年一旦遇敵不能為吾東向放一箭今雖欲閉壁誰肯效死者李昊勸昶降乃遣伊審微奉降表詣軍前劉光義曹彬自䕫門㑹王全斌等于成都光義等發䕫門萬施開忠等刺史皆迎降至遂州知州陳愈亦降諸將所過咸用屠戮以逞曹彬禁之乃止故峽路兵始終秋毫不犯至成都王全斌等縱部下掠奪子女曹彬屢請旋師不聼其後事具國史兹不著論曰唐末五代宇縣分裂歷七姓十三君垂五十年僅守中原之境自江以南割而為四僣竊蜂起豈獨建與知祥而已哉我宋龍興削平僣僞昶不率先諸侯以朝京師而天討所加方且尤其豐衣美食之不足以得士抑愚矣王師既定蜀繼下江南俘李煜而車書混一列聖撫摩覆育深仁厚澤淪肌浹髓下闕蜀鑑卷八

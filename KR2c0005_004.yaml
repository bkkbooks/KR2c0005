body:
  text: 蜀鑑巻四宋郭允蹈撰晉王濬自蜀平呉晉武帝泰始十年呉大司馬陸抗卒抗疾病上疏曰西陵建平國之蕃表既處下流受敵二境若敵㲹舟順流星奔電邁非可恃援他部以救倒懸也此乃社稷安危之機非徒封疆侵凌小害也臣父遜昔在西垂上言西陵國之西門雖云易守亦復易失若有不守非但失一郡荆州非呉有也如其有虞當傾國爭之乞特詔簡閲使臣所部足滿八萬省息衆務倂力備禦臣死之後乞以西方為屬西陵今峽州建平今歸州咸寧二年征南将軍羊祜上䟽請伐呉祜鎮襄陽與陸抗對境嘗與抗連和㑹抗卒祜上疏曰蜀平之時皆謂呉當并亡十有三年矣蜀之為國非不險也皆云一夫荷㦸千人莫當及進兵之日曽無藩籬之限乘勝席卷徑至成都漢中諸城皆鳥栖而不敢出非無戰心誠力不足相抗也及劉禪請降諸營堡索然俱散今江淮之險不如劍閣孫皓之暴過於劉禪呉人之困甚於巴蜀而大晉兵力盛於往時今若引梁益之兵水陸俱下荆楚之衆進臨江陵平南豫州直指夏口徐揚青兖並㑹秣陵以一隅之呉當天下之衆勢分形散所備皆急巴漢竒兵出其空虚一處傾壞則上下震蕩雖有知者不能為呉謀矣咸寧四年祜病求入朝靣陳伐呉之計且曰平呉之後當勞聖慮耳還鎮舉杜預為鎮南将軍都督荆州諸軍事咸寧五年益州刺史王濬上疏請伐呉羊祜以王濬為益州太守濬大治舟艦木柹蔽江而下乃上疏曰孫皓荒淫㓙虐宜速征伐臣作船七年日有朽敗願無失事機太康元年王濬唐彬㑹杜預王渾諸軍伐呉大舉伐呉王渾出江西杜預出江陵王濬唐彬下巴蜀王濬唐彬撃破丹陽呉人於江磧要害之處並以鐡鎖横截之又作鐵錐長丈餘暗置江中以逆拒舟艦濬作大筏數十方百餘步縛草為人披甲持杖令善水者以筏先行遇鐵錐錐輒著篾而去又作大炬長十餘丈大數十圍灌以麻油在船前遇鎖然炬燒之湏臾融液斷絶於是船無所礙秭丹陽城屬秭歸王濬克西陵克荆門夷道二城杜預進攻江陵克之預等分兵以益濬攻武昌克之王濬自武昌徑趣建業入於石頭呉主皓請降王濬既至西陵杜預與之書曰足下既摧其西藩便當徑取建業討累世之逋㓂釋呉人於塗炭亦曠世一事也濬自武昌徑趣建業兵甲滿江旌旗燭天威勢甚盛呉潘濬入見呉主呉主問水軍消息對曰蜀船皆小今得二萬兵乘火船以戰自足破之於是合衆授潘濬節鉞明日當發其衆悉潰王渾遣信要王濬蹔過論事濬舉帆直指建業報曰風利不得泊也是日濬戍卒八萬方舟百里鼓譟入於石頭吳主皓面縳輿櫬詣軍門降建業建康府石頭城在建康論曰秦自蜀伐楚未大得志也王濬以益州之力破丹陽克西陵下荆州攻武昌片帆而直指建業遂平江東其功偉矣蜀係於上流之安危亦大彰明較著矣晉武之平呉用蜀之力如此而子孫之偏安於江東者乃棄蜀弗顧可勝責哉李特入蜀晉惠帝元康八年巴氐流人李特等自略陽入蜀初張魯在漢中賨人李氏自巴西宕渠往依之魏武克漢中李氏歸之遷於略陽號曰巴氐其孫特庠流皆有材武闗中荐飢略陽天水等六郡民流移就糓入漢川者數萬家道路窮乏特兄弟振救之由是得衆心流民至漢中上書求寄食巴蜀詔書不聽𠡠闗禁之戸曹李苾開闗放入散在梁益不可禁止李特至劍閣太息曰劉禪有如此地而縛于人豈非庸才邪永康九年李特入成都殺前益州刺史趙廞趙廞隂有據蜀之志以李特兄弟材武厚遇之詔徴廞為大長秋以耿滕為益州刺史廞遂殺滕自稱益州牧任用李庠庠驍勇得衆廞心忌之㑹庠勸廞稱號廞斬之李特李流怨廞引兵軍綿竹廞遣費逺斷北道屯綿竹之石亭李特收兵得七千餘人襲逺等軍破之遂進攻成都廞走廣都為從者所殺羅尚討李特永寧元年詔羅尚為益州刺史特等聞尚來甚懼以牛酒勞尚於綿竹牙門將王敦廣漢太守辛冉勸尚誅特尚不從符下秦雍召還流民入蜀者以李特為宣威將軍朝廷符下秦雍使召還流民又遣御史督之李特兄輔自略陽至蜀言中國方亂不足復還特然之累遣天水閻式詣羅尚求權停至秋朝廷論討趙廞功拜特宣威將軍弟流奮威将軍皆封侯璽書下益州條列流民與討廞者将加封賞辛冉寢朝命不以實上衆咸怨之羅尚督流民限七月上道時流民布在梁益為人健力聞州郡逼遣人人愁怨不知所為特復遣閻式詣尚求停至冬辛冉李苾以為不可尚舉秀才杜弢别駕式為弢説逼移利害弢亦欲寛流民一年尚不從冉苾與尚謀欲殺流民取其資貨尚移書令梓潼太守張演於諸要施闗摉索寳貨特數為流民請留流民皆率歸特特又以計激怒之旬月之間歸特者二萬人流亦聚衆數千人特又遣閻式詣尚尚謂式曰告諸流人今聽寛矣式至綿竹謂尚言不可信勸特宜深為備特從之廣漢太守辛冉犍為太守李苾襲李特營不克特攻冉於廣漢冉敗奔江陽特據廣漢遂攻羅尚於成都尚頻為特所敗乃阻長營縁郫水作營連延七百里與特相拒太安元年以張徵為廣漢太守軍徳陽特攻徵取德陽以其將騫碩守之李驤李流進攻成都太安二年詔荆州刺史宋岱建平太守孫阜帥水軍三萬以救羅尚阜進逼徳陽特遣任臧拒之羅尚遣兵討特斬之傳首洛陽孫阜破徳陽獲騫碩任臧退屯涪陵李流至成都羅尚閉城自守李雄襲擊孫阜軍大破之宋岱卒於墊江荆州軍遂退雄特子徳陽今遂寜府墊江今合州涪陵今涪州荆州之軍自墊江上也李雄入成都太安二年李雄攻殺汶山太守陳圖遂取郫城李流徙屯郫汶山今茂州郫城今郫縣李流卒李雄自稱益州牧治郫城羅尚襲郫城不克退保大城李驤攻犍為斷羅尚運道獲太守襲恢殺之犍為特治武陽今犍為縣輿地廣記云即武陽縣地犍為郡由特嘗治此而得名也近世為江鄉志者乃謂治今彭山非是李雄攻羅尚尚由牛鞞水東下雄入成都牛鞞今簡州安陽縣即中水也入江陽都江羅尚抗李雄永興元年羅尚至江陽尚遣使表狀詔尚權統巴東巴郡延陵以供軍賦尚遣别駕李興詣荆州劉𢎞求糧𢎞綱紀以運道阻逺且荆州自空乏欲以零陵米五千斛與尚𢎞曰天下一家彼此無異吾今給之則無西顧之憂矣又遣治中何松屯巴東為尚後繼巴東今歸州羅尚移屯巴郡遣兵擊蜀獲李驤妻昝氏及子夀巴郡治江州今䕫州重慶府永嘉元年尚施置闗戍至漢安僰道漢安今資州僰道今叙州戍漢安所以防中水戍僰道所以防大江尚在江州而設戍於此則犍為南安以西皆為雄有也秦州流民鄧定等據成固掠漢中李雄遣李離等助之遂䧟南鄭離等引還盡徙漢中民於蜀漢中人句方伯落帥吏民還守南鄭永嘉二年雄遣將軍李鳳屯晋夀以寇漢中詔以張光為梁州刺史治新城晉夀漢葭萌縣昭烈改為漢夀晉泰始中改為晉夀新城魏文帝分漢中立新城郡治房陵天水訇琦殺雄太尉以梓潼降尚驤及琦等戰敗死永嘉四年荆州牧劉𢎞表譙登為梓潼内史登進攻宕渠殺雄巴西太守還據涪城登譙周孫居巴西雄巴西太守馬脱殺登父登詣劉𢎞請兵復讎𢎞表登為梓潼内史使募三巴蜀漢民為兵克復州郡登進攻宕渠殺馬脱食其肝㑹梓潼降登進據浯城雄自攻之為登所敗涪城今綿州雄以李國鎮巴西帳下文碩殺國以巴西降尚巴西治閬中晉志充國宕渠安漢皆屬巴西郡折衝將軍張羅進據犍為之合水華陽國志云巴蜀為語曰譙登治涪城文碩在巴西張羅守合水巴氐那得前合水在今嘉定府龍遊縣青衣水出於盧山之徼外合於岷江故謂之合水雄遣張寳襲梓潼訇琦等奔巴西秋七月散騎常侍都督梁益二州夷陵侯羅尚薨論曰李特父子乘晉室之亂跳梁於蜀土一羅尚庸人耳徒以晉室方伯之權猶能誅特而抗雄雄雖僣號於蜀漢中三巴之地固非其有也當是時中原政亂劉𢎞雖死而琅琊在建業陶侃在武昌蜀之衣冠南下荆州者十餘萬譙登等猶能崛起以自立使江左君臣有跨有荆益之規模任陶侃以討賊之責驅蜀土之人士西歸以興復則雄豈遂為逋誅不討之冦哉惜乎茂𢎞士行為謀之不逺而遂委蜀於蠻夷也李雄偽定蜀地永嘉四年以皮素為益州刺史羅宇殺素於巴郡建平都尉暴重殺宇官屬表韓松為刺史治巴東李雄遣李驤攻譙登於涪城羅尚之子宇惡登不給其糧皮素至巴郡欲治宇罪羅宇使人夜殺之暴重還殺宇巴郡亂官屬表監軍韓松為刺史永嘉五年李驤㧞涪城梓潼太守譙登死遂㧞巴西太守文碩死之始定巴西梓潼地驤攻登於涪城登食盡援絶驤攻之急士民皆薫鼠食之餓死甚衆無一人叛者正月㧞之遂乘勝㧞巴西殺文碩於是巴西梓潼為雄有雄大赦改元玉衡譙登至成都不屈雄殺之雄遣師攻僰道犍為太守魏紀棄城走江陽太守姚襲死之僰道今叙州犍為治今叙州犍為縣資中牛鞞南安諸邑皆𨽻焉江陽今瀘州雄始定其地氐隗文等作亂暴重討之重殺刺史韓松自領其事隗文等反於宜都在峡州巴東將吏殺暴重表巴郡太守張羅行三府事羅與隗文等戰死之表王異行刺史隗文等驅略吏民以降于雄華陽國志曰巴中無復餘種矣三府事謂平羌將軍益州刺史西夷校尉江陽太守張啟殺刺史王異而代之啓卒官屬表涪陵太守向沈代啓南保涪陵愍帝建興元年向沈卒蜀郡太守程融等表汶山太守蘭維為西夷校尉維將吏民北出至巴東雄將李恭費黒等獲之於是自巴郡以東皆為雄有矣涪陵李運巴西王建冦漢中梁州太守張光遣參軍晉邈擊殺之建子婿楊虎収餘衆屯于厄水光遣子孟萇討之不克厄水在南鄭縣東成都氐王楊難敵遣兵救楊虎擊張孟萇孟萇敗績死之光卒州人立胡子序領梁州楊虎難敵攻序序棄城走建興二年漢中民張咸等逐楊難敵以其地降于雄遂定漢中雄以李鳳為梁州刺史任回為寜州刺史李恭為荆州刺史以鳳理漢中回謀南中恭控巴東也蜀人杜􅌢等流徙荆湘晉太安二年益州流民十餘萬户徙荆州李特之亂三蜀民流迸南入東下城邑皆空野無烟火其入荆州者十餘萬户覊旅貧乏鎮南將軍劉𢎞大給其田及種糧擢其賢才随才授用流民稍安永嘉五年蜀人李驤殺樂鄉縣令南平太守應詹醴陵令杜􅋶撃破之巴蜀流民布在荆州間數為土民所侵苦蜀人李驤聚衆據樂鄉應詹與杜􅋶擊破之􅋶字景文蜀郡成都人祖植有名蜀土􅋶才學著稱州舉秀才為成都别駕巴氐流民入蜀羅尚督追之􅋶勸尚寛流民一年尚不從􅋶致秀才板歸家李特反弢避地荆州應詹愛其才而禮之辟為醴陵令驤聚衆屯樂鄉􅋶擊破之荆州太守王澄討驤驤請降澄許而襲之以其妻子為賞沉八千餘人於江益州流民起兵湘州奉杜􅋶為主南破零桂東掠武昌李驤既死流民益怨恨杜疇蹇撫等復擾湘州參軍馮素與流民汝班蹇碩不恊言於刺史荀眺曰流人皆欲反眺以為然欲盡誅流人班等懼死聚衆以應疇杜􅋶時在湘中衆共推為主眺委城走攻下郡邑征南將軍山簡鎮夏口􅋶具陳其事簡尋卒王澄遣王機擊􅋶不克澄徙治孱陵永嘉六年以周顗為荆州刺史王敦遣陶侃尋陽太守甘卓共擊􅋶王敦殺王澄顗始至州建平流民傅密等叛迎杜􅋶􅋶遣别將王真襲沔陽顗狼狽失據王敦誣王澄與􅋶通信縊殺之建興元年周顗屯潯陽􅋶掠其人口陶侃遣朱伺救之伺大破􅋶師於武昌拜侃荆州刺史陶侃兵敗於杜曽王敦表侃白衣領職侃帥周訪等進擊杜􅋶大破之復侃官建興三年杜􅋶遺書應詹請降於琅琊王王許之􅋶遺應詹書曰天歩艱難始自吾州州黨流移在於荆土其所遇值蔑之如遺頓復死亡者略復過半備嘗荼毒足下所鑒也客主難乆嫌隙易結不謂樂鄉起變出於不意時與足下思散疑結求擒其黨帥惟恐算不經逺力不䧟堅耳及在湘中懼死求生遂相結聚欲守善自衞天下小定然後輸誠盟府尋山公鎮夏口即具陳之此公鑒開塞之㑹察窮通之變納吾於衆疑之中非髙識𤣥覩孰能若此西州人士得沐浴於清流豈惟滌蕩瑕穢乃骨肉之施此公薨逝斯事中廢賢愚痛毒竊心自悼欲遣滕永文張休豫詣大府備列起事以來本末但恐貪㓛狥名之徒將䜛間於聖主之聽戮吾使於市朝以彰叛逆之罪故未敢遣之而甘陶卒至水陸十萬旌旗曜於山澤舟艦侈於三川威則威矣然吾衆竊未以為懼晉文伐原以全信為本故能使諸侯歸之陶侃宣赦書而繼之以進討豈所以崇奉明詔示軌憲於四海逼向義之夫以為叛逆之人踧思善之衆以極不赦之責非不戰而屈人之筭也驅略烏合欲與必死者求一戰未見争衡之機權也吾之赤心貫於神明西州人士卿粗悉之耳寜當令抱枉於時不證於大府耶昔虞卿不榮大國之相與魏齊同其安危司馬遷明言救李陵雖刑殘而無慨足下抗威千里聲播岷衡進宜為國思静難之略退與舊交措枉直之正不亦綽然有餘裕乎望卿騰吾牋令時達盟府遣大使之臨使吾得披露肝膽没身何恨哉伏想盟府必結紐於紀綱為一匡於聖世使吾厠列義徒負戈前驅迎皇輿於閶闔掃長蛇於荒裔雖死之日猶生之年也若欲掃清方夏却定中原吾得一年之糧使泝流西歸夷李雄之逋冦修禹貢之舊獻展微勞以補徃愆復州邦以謝鄰國亦其志也惟所裁處耳吾逺州寒士與足下出處殊倫誠不足感神交而濟其傾危但顯吾忠誠則汶嶽荷忠順之恕衡湘無伐叛之虞惟足下宏納之望拯吾徒䧟溺之艱焉可金玉其音哉然顒顒十餘萬口亦勞瘁於警備思放逸於南畆矣衡嶽江湘列吾左右若徃言有貳血誠不亮益州受殃不惟鄙言而已詹甚哀之乃啓呈􅋶書并上言曰􅋶益州秀才素有清望文理既優幹事兼羙徃因使流寓居詹郡界其貞心堅白詹所委悉李驤為變樂鄉刼略良善􅋶時出家財招募忠勇登壇㰱血義誠慷慨㑹驤攻燒南平􅋶遂東流巴漢與湘中鄉人相遇推其素望遂相憑結論􅋶本情非首作亂階者也然破湘川實􅋶之罪亦由兵交其間遂使滋蔓按􅋶今書血誠亦至矣昔朱鮪自疑於洛陽光武指河水以明心鮪感義歸誠終展力報施受封侯之寵尚恕過録功也詹竊謂今者當厄運之㑹思𢎞逺猶故齊赦射鈎之誅晉貰斬祛之戮用能濟翼戴之髙勲隆一匡之羙譽况􅋶等素無斯愆而稽䫙投命邪以為可遣大使宣揚聖㫖雲澤沾之於上百姓沐浴於下則上下交泰江左無風塵之虞矣通鑑不載􅋶與應詹書本末今具録如右蜀土流移十餘萬家離散不保此大事也豈宜略邪按此乃陶侃心憚王敦規模不大不能招納􅋶等欲討􅋶以論功耳晉史以成敗論人乃謂􅋶等請降於元帝帝不許觀􅋶與詹書則元未嘗請降而不許也又謂􅋶偽降於山簡皆非其實讀史者以意逆志可也以􅋶為巴東監軍使前南海大守王運受其降諸將攻弢不已􅋶遂殺運遣其將王真入武陵五谿斷官軍運道􅋶既受命諸將狥功者攻之不已􅋶不勝憤怒殺運復反武陵今韋徳府路通五谿蠻陶侃應詹進攻杜弢􅋶將王真出降􅋶遁走不知所在侃等諸軍齊進弢乃逃遁不知所在城中金寳溢目應詹一無所取惟取圖書莫不嘆之晉史應詹傳稱賊中金寳溢目應詹但取圖書豈有賊而載圖書者乎此皆梁益流徙之衣冠也悲夫論曰蜀之流民十餘萬家流徙東下劉和季在江陵給其田疇山季倫在夏口接其歸附庶乎招懐之略矣四方蹙蹙江左獨安琅琊君臣念流離之及境随才授任授之甲兵及其鋒而用之李雄僣號而魚復江闗曽莫之守固可長驅而復舊物合二長以圖中原也王處仲剛愎猜忍不忠王室陶士行亦不知此乃以討杜􅋶為莫大之功振旅紀勲由此專任上流則亦陋矣哉愚觀士行與温太真共討蘇峻獨以不與顧命為歉且恃其區區之糧峙欲貳其勤王之誠心事之不純抑亦可知是雖神機明鑒克勤小物㓛烈之在晉者如彼其卑也烏得為忠順如孔明者乎然巴氐至蜀者二萬人耳而蜀土衣冠不務紏鄉閭為討僣逆守墳墓之計乃輕詭易驚率然東下隕踣異鄉䧟於誅死之罪杜􅋶之事其亦蜀土之永鑒歟桓温討李勢晉穆帝永和二年十一月荆州刺史桓温伐蜀拜表遂行温將伐蜀將佐皆以為不可袁喬勸之曰李勢無道臣民不附且恃其險逺不修戰備宜以精卒萬人輕齎疾趨比其覺之我已出其險要可一戰擒也蜀地富饒户口繁庶諸葛武侯用之抗衡中夏若得而有之國家之大利也温從之十一月辛未温帥益州刺史周撫南郡太守譙王無忌伐蜀拜表即行温軍泝魚復諸葛亮造八陣圖於魚復平沙之上壘石為八行行相去二丈温見之謂此常山蛇勢也魚復今䕫州奉節縣永和三年三月温軍至青衣漢主勢遣李福李權向彭模昝堅引兵向犍為福等自山陽趣合水諸將欲設㐲於江南以待晉兵昝堅不從引兵自江北鴛鴦碕渡向犍為青衣今嘉州山陽在廣都合水今嘉定府龍逰縣鴛鴦碕華陽國志寰宇記並載在今叙州南溪縣昝堅畏温故迂路怯懦引兵自鴛鴦碕向犍為也犍為今叙州府犍為縣温至彭模昝堅至犍為還自沙頭濟衆潰温至彭模議欲分為兩軍異道俱進以分漢兵之勢袁喬曰今懸軍深入若分兩軍萬一偏敗大事去矣不如全軍而進齎三日糧示無還心勝可必也乃自將歩卒直詣成都李福進攻彭模孫盛等奮擊走之温進遇李權三戰三捷昝堅至犍為乃知與温異道還自沙頭津後比至温已軍成都之十里陌堅衆自潰沙頭在今崇慶府新津縣彭模今眉州彭山縣温長驅至成都李勢降勢悉衆出戰於笮橋袁喬督士卒戰大破之勢輿櫬出降舊史稱李勢夜遁九十里至晉夀葭萌城然後出降通鑑亦言走之葭萌此俱誤也成都去葭萌何但九十里勢降表言即日到白水者晉史大扺舛誤司馬公辨之亦時有不精耳四月温振旅還江陵温留成都三十日李勢降表以三月十七日降温也李特以惠帝元康八年入蜀特子雄雄傳姪班子期殺班李驤子夀殺期夀傳子勢六世至永和三年㓕凡五十年論曰李雄之據蜀也比不得漢中而瞿唐灔預又無一夫之守二門悉開洞見堂奥桓温之泝魚復也徘徊以觀八陣之圖如入無人之境而遂制蜀之死命矣嗚呼然後知陶士行坐鎮荆州四十年曽不加一矢於僣偽真不忠於晉室也哉李夀縱獠於蜀晉康帝建元元年蜀李夀從䍧柯引獠入蜀李雄時嘗遣李夀攻朱提遂有南中之地夀既篡位以郊甸未實都邑空虚乃徙傍郡户三丁巳上以實成都又徙䍧柯引獠入蜀境自象山以北盡為獠居蜀本無獠至是始出巴西宕渠廣漢陽安資中犍為梓潼布在山谷十餘萬落時蜀人東下者十餘萬家獠遂依山傍谷與下人參居參居者頗輸租賦在深山者不為編户種類滋蔓保據巖壑依林履險若履平地性又無知殆同禽獸諸夷之中難以道義招懐也北史不載李夀縱獠而言獠自出未知首禍何因賴李膺益州記詳著其始惜司馬公之不及此也象山未知何地論曰蜀之衣冠流徙荆湘而名郡樂郊皆為獠居矣至唐末而患猶未已也風物之不逮於兩京幾數百年職此之由自蜀通中國以来得禍未有如是之酷且乆也可不鑒哉蜀鑑巻四

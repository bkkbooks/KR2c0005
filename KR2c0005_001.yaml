body:
  text: 蜀鑑卷一宋郭允蹈撰秦人取南鄭秦厲公二十六年秦左庶長城南鄭秦躁公二年南鄭反秦惠公十三年秦伐蜀取南鄭南鄭本古褒國按酈道元水經注云東周之初鄭桓公死於犬戎其民南奔居此因曰南鄭後為蜀所併至是秦始取之論曰常璩謂蜀以褒斜為前門則南鄭者蜀之扞蔽也南鄭既入秦七十二年而蜀遂亡唇亡齒寒也久矣後之經理蜀者可不鑒乎秦人取蜀秦惠文王初更九年司馬錯伐蜀滅之常璩華陽國志曰蜀王封弟葭萌號苴侯命其邑曰葭萌苴侯與巴王為好巴與蜀讐故蜀王怒伐苴侯苴侯奔巴求救於秦惠王方欲謀楚羣臣議曰夫蜀西僻之國戎翟為鄰不如伐楚司馬錯曰蜀國富饒得其布帛金銀足給軍用水通於楚有巴之徑卒浮大舶船以乘向楚楚地可得得蜀則得楚楚亡則天下并矣秋秦張儀司馬錯從石牛道伐蜀蜀王自於葭萌拒之敗績開明氏遂亡凡王蜀十二世司馬錯等因取苴與巴焉又戰國策曰司馬錯欲伐蜀張儀曰不如伐韓王曰請聞其説對曰今夫蜀西僻之國而戎狄之長也弊兵勞衆不足以成名得其地不足以為利爭名者於朝爭利者於市三川周室天下之市朝也而顧爭於戎狄去王業逺矣錯曰不然富國者務廣其地強兵者務富其民以秦攻蜀譬以狼逐羊也取其地足以廣國得其財足以富民繕兵不傷衆而彼已服矣故拔一國而天下不以為暴利盡四海諸侯不以為貪是我一舉而名實兩附也今攻韓劫天子惡名也而未必利也不如伐蜀之完也惠王曰善起兵伐蜀取之蜀既屬秦益強富厚輕諸侯葭萌在今利州石牛即今大安軍金牛鎮秦惠文王十一年封子通國為蜀侯以陳壯為相置巴郡以張若為蜀國守移秦民萬家實之秦惠文王十四年陳壯反殺蜀侯通國秦遣甘茂張儀司馬錯復伐蜀誅陳壯秦武王元年封子惲為蜀侯秦昭襄王六年蜀侯惲反司馬錯定蜀封子綰為蜀王秦昭襄王二十二年王誅蜀侯綰但置蜀守張若取筰及江南地論曰秦人取蜀以王其親子弟三而卒皆殺之歷三十二年而始定其取之不亦難乎初置守張若而定黔中繼用李氷而始平水害蜀自是安寧而漢髙帝用之以取三秦其所係不亦重乎秦人取漢中秦惠文王十三年秦庶長章攻楚漢中取地六百里分巴蜀置漢中郡秦孝公初楚自漢中南有巴黔之地孝公招戰士明功賞國以富強至是惠文王既取蜀遂乘勝取楚地六百里又分巴蜀置漢中焉論曰按南鄭自南鄭漢中自漢中南鄭乃古褒國秦未得蜀以前先取之漢中乃今金洋均房等州六百里是也秦既得漢中乃分南鄭以𨽻之而置郡焉南鄭與漢中為一自此始春秋楚人秦人巴人滅庸即今金房兩州地西漢地理志漢中郡治西地今金州上庸郡是也漢中乃秦楚巴蜀必爭之地秦得之而全據上流以謀楚矣昭襄王十三年任鄙為漢中守昭襄王二十年王之漢中秦人自蜀伐楚昭襄王二十七年司馬錯發隴西因蜀伐楚黔中拔之昭襄王三十年蜀守張若伐楚取巫郡及江南為黔中郡華陽國志云錯率巴蜀衆十萬大舶船萬艘米六百萬斛浮江伐楚巫郡在今巫山縣及施州黔中郡即今涪黔鼎澧諸郡皆黔中地論曰秦併六國自得蜀始蓋與秦為怨者楚也秦既取蜀取漢中又取黔中則斷楚人之右臂而楚之勢孤矣劫質懷王操縱豫奪無不如意於是滅六雄而一天下豈偶然哉由得蜀故也漢髙帝由蜀漢定三秦漢元年春正月沛公為漢王王巴蜀漢中都南鄭秦始皇分天下為三十六郡巴蜀漢中居其三割南鄭以𨽻漢中漢因建都於此漢王欲攻項羽蕭何諫曰雖王漢中之惡不猶愈於死乎語曰天漢其稱甚美臣願大王王漢中養其民以致賢人收用巴蜀還定三秦天下可圖也漢王令張良厚遺項伯使盡請漢中地項王許之漢王從杜南入蝕中張良送至褒中良説漢王燒絶棧道杜南在今京兆府萬年縣古杜伯國也蝕中入漢中道川谷名寰宇記曰褒口在褒城縣北北口曰斜南口曰褒同為一谷自褒谷至鳳州界一百三十里始通斜谷斜口在鳳翔府郿縣谷中褒水所流穴山架木以行張良勸漢王燒絶棧道以備諸侯盜兵且示項羽無東意今地名石門漢王至南鄭拜韓信為大將諸將及士卒皆歌思東歸多道亡韓信亦去蕭何追之信説漢王還定三秦遂聽信計今興元南鄭縣米倉山有截賢嶺韓信廟或云蕭何追信於此漢王留蕭何收巴蜀租給軍糧食秋八月引兵從故道出襲雍章邯迎戰陳倉敗走止戰好畤又敗走遂定雍地華陽國志曰漢祖自漢中出三秦伐楚蕭何發蜀漢米萬船而給助軍糧又曰巴郡有賨民多居渝水左右天性徑勇初為漢前鋒陷陳鋭氣喜鬬帝善之曰此武王伐紂之歌也令樂人習學之謂之巴渝舞故道在今鳳州兩當縣陳倉在鳳翔府寶雞縣好畤在鳳翔府天興縣論曰漢髙帝留漢中未幾反其鋒以向關中足迹雖未嘗至蜀然所漕者巴蜀之軍糧陷陳者巴渝之徑勇由故道戰陳倉定雍地而王業成矣孰謂由蜀出師不可以取中原哉公孫述盡有蜀地漢更始元年公孫述自稱益州牧述茂陵人王莽以為導江卒正治臨卭髙陽宗成等起兵徇漢中以應漢述遣使迎成等選精兵迎擊殺之併其衆假漢使者自稱益州牧按王莽改蜀郡為導江太守為卒正更始將李寶張忠徇蜀漢述遣其弟恢擊寶忠於綿竹大破之述自立為蜀王都成都光武建武元年述遣其將侯丹取南鄭南鄭人延岑反圍南鄭更始所立漢中王嘉初擊敗之岑復反嘉兵敗走岑遂據漢中進兵武都為更始將李寶所破岑走天水述遂遣其將侯丹取南鄭嘉收散卒數萬人以李寶為相從武都南擊侯丹不利還軍河池下辨復與延岑連戰岑引北入散關至陳倉嘉追擊破之岑屯杜陵與赤眉將逢安戰大破之漢中王嘉亦與赤眉將廖湛戰於谷口大破之光武令鄧禹招嘉嘉因來歙請降延岑自武關走南陽述遂有漢中地武都今階州天水今秦州河池今鳳州下辨今成州散關今大散關谷口在今鳳翔府郿縣武關今商州南陽今登州述遣其將任滿據扞關李熊説述東拒扞關述遣滿從閬中下江州據之史記張儀説楚曰秦西有巴蜀大船下水而浮一日行三百餘里不至十日而拒扞關扞關驚則黔中巫郡非王之有矣史記索隱以為扞關即魚復江關今瞿唐關顔師古注輿地廣記郡縣志皆仍其説惟後漢史注扞關在今峽州巴山縣樂史寰宇記峽州長楊縣有古扞關城存即巴山縣地此為得之扞關實楚地史記稱楚肅王所築今巫郡江關則乃屬巴地故張儀云拒扞關則黔中巫郡非秦有拒抵也至若黔中巫郡皆在楚扞關之外也蓋扞關乃楚之扞關江關乃巴蜀之江關也述據扞關則荆門虎牙在扞關之內皆其設險之地豈肯先自隘而但守魚復之江關哉故辨之以正地理之關江州縣名今重慶府閬中今閬中述遣其將李育程烏屯陳倉馮異迎擊大破之述聚兵數十萬人積糧漢中遣李育程烏將數萬衆出屯陳倉徇三輔馮異擊走之育烏俱奔漢中陳倉在鳳翔寶雞縣光武得隴望蜀建武八年來歙伐隗囂拔略陽隗囂據隴右歙將二千餘人襲略陽斬守將金梁囂大驚曰何其神也帝聞得略陽甚喜曰略陽囂所依阻心腹已壞則制其支體易矣略陽在今秦州隴城縣隗囂圍略陽公孫述遣將李育田弇助之囂盡鋭攻略陽纍月不能下夏四月帝自征隗囂至髙平河西竇融來朝髙平今鎮戎軍髙平寨古安定地隗囂將妻子奔西城西城今金州西城縣吳漢岑彭圍西城耿弇蓋延圍上邽九月乙卯車駕還宫帝自上邽晨夜東馳賜岑彭等書曰兩城若下便可將兵南擊蜀虜人苦不知足既平隴復望蜀每一發兵頭鬚為白岑彭擁谷水灌西城城未沒丈餘會王元等將蜀救兵五千乘髙卒至鼓譟大呼曰百萬之衆方至漢軍大驚元等決圍死戰遂得入城迎囂歸冀城冀城在今秦州隴城縣上邽在今秦州隗囂病死子純立帝使來歙護諸將屯長安遂討隗純天水十月攻破之純降歙上書曰公孫述以隴西天水為藩蔽故得延命假息今二郡平蕩則述智計窮矣公孫述使王元拒河池來歙蓋延進攻大破之遂克下辨隗囂將王元降述述使拒河池歙與蓋延等破之遂克下辨乘勝而進蜀人大懼河池今鳳州下辨今成州同谷縣盜殺來歙王元遣刺客殺歙歙以蓋延領其軍岑彭吳漢由江道取蜀建武五年岑彭自夷陵屯津鄉田戎據夷陵岑彭攻拔之獲其衆萬餘人戎亡入蜀述以戎為異江王岑彭謀伐蜀以夾川榖少水險難漕留馮駿軍江州田鴻軍夷陵李玄軍夷道自引兵還屯津鄉當荆州要會喻告諸蠻夷降者奏封其君長夷陵今峽州夷陵縣夷道今峽州宜都縣津鄉左氏傳曰楚子大敗於津後漢志云江陵有津鄉寰宇記云津鄉故城在今江陵縣東渚宫即其地建武六年公孫述使田戎出江關招其故衆欲取荆州不克江關漢地理志云江關都尉理魚復水經注云白帝山北緣馬嶺接赤甲山南北相去八十五丈東西七十丈東傍瀼溪西南臨大江瞰之眩目惟馬嶺小差逶迤猶斬山為路羊腸數轉然後得上公孫述據蜀自以金承土運故號曰白帝城寰宇記云赤甲城公孫述築不生樹木土石悉赤如人袒臂故曰赤甲與舊白帝城相連皆在縣北即江關之要也在今夔州奉節縣建武九年春述遣田戎下江關據荆門虎牙述遣其將田戎任滿程泛將數萬人下江關擊破馮駿等軍遂拔巫及夷道夷陵因據荆門虎牙橫江水起浮橋鬬樓立櫕柱以絶水道結營跨山以塞陸路拒漢兵荆州記云南荆門北虎牙二山臨江楚之西塞酈道元注水經云公孫述依二山作浮橋拒漢師下有急灘名虎牙灘郭璞江賦曰虎牙桀立以屹崒荆門闕竦而盤礴圓淵九回以懸騰湓流雷詬而電激寰宇記云虎牙山有石壁其色黃間有白文亦有牙齒形夷陵志云上有城下有十二碚有灘甚惡在今峽州建武十一年春岑彭破夷陵入江關上墊江馮駿守江州岑彭數攻田戎等不克帝遣吳漢率劉隆等三將發荆州兵凡六萬餘人騎五千匹與彭會荆門彭裝戰船數十艘吳漢以棹卒多費糧穀欲罷之彭以為蜀兵盛不可遣上書言狀帝曰大司馬不曉水戰荆門之事由公而已閏月彭募攻浮橋先登者賞於是偏將軍魯竒應募而前東風狂急竒船逆流直衝浮橋櫕柱有反把鉤竒船不得去竒等乘勢殊死戰因飛炬焚之風怒火盛樓橋崩燒彭悉軍順風並進所向無前蜀兵溺死者數千人斬任滿擒程泛而田戎走保江州彭率臧宫劉歆長驅入江關彭到江州以其城固糧多難卒拔留馮駿守之自引兵乘利直指墊江攻破平曲收其米數十萬石吳漢留夷陵裝露橈繼進墊江即今忠州平曲未詳然彭既指墊江從浯水上平曲則在今遂寧潼川之境也述使其將延岑吕鮪王元公孫恢拒廣漢及資中又遣侯丹拒黃石漢立廣漢郡資中今資州資陽縣乃平水經歷之地寰宇記云黃石在今涪州涪陵縣有橫石灘岑彭已上墊江則述拒廣漢以備涪水屯資中以備江陽又先遣侯丹率二萬人以拒黃石則逆拒於江州之竟也岑彭自墊江還江州泝都江襲擊侯丹大破之使臧宫拒延岑於涪水大破之彭遂進拔武陽彭使臧宫將降卒五萬從涪水上平曲拒延岑自分兵浮江下還江州泝都江而上襲擊侯丹大破之因晨夜倍道兼行二千餘里徑拔武陽使精騎馳廣都去成都數十里勢若風雨所至皆奔散初述聞漢兵在平曲故遣大兵逆之及彭至武陽繞出延岑軍後蜀地震駭述大驚以杖擊地曰是何神也延岑盛兵於沅水臧宫以轉輸不繼降者欲散畔會帝遣謁者將兵詣岑彭有馬七百匹宫矯制取以自益晨夜進兵多張旗幟登山鼓譟右步左騎挾船而引呼聲動山谷岑大震恐因縱擊大破之斬首溺死者萬餘人延岑奔成都其衆悉降自是降者以十萬數王元舉衆降後漢志沅水當為沈水水經注云沈水自廣漢郡入涪江今按中江縣有一水入涪臧宮旋平綿竹必自今中江水也論曰延岑自廣漢入涪水以拒墊江今合州而岑彭下墊江由江州復上都江拔武陽武陽今彭山縣由今洌州復回重慶府上瀘敘嘉眉此蜀人所以為神也史謂自都江倍道兼行二千里至武陽蓋夸張之誤矣冬十月盜殺岑彭於武陽十有二月吳漢將三萬人泝江而上述使刺客詐為亡奴降岑彭刺殺彭監軍鄭興領其營以俟吳漢至而授之建武十二年春正月吳漢進拔廣都吳漢破述餘黨於武陽帝詔漢直取廣都據其心腹漢乃進軍攻廣都拔之秋七月馮駿拔江州獲田戎臧宫拔綿竹破涪城斬公孫恢吳漢入成都述自殺誅延岑論曰光武得隴望蜀其勢若易矣而功反難岑彭泝流討蜀其勢若難矣而功反易何耶以下辨河池皆武都之厄塞述能守之誠未易窺而瞿唐為蜀之天險述不之守而逺恃荆門虎牙以為固浮橋一燎而述之技窮矣然光武中興復漢舊物述猶陸梁一隅斗絶之蜀此其見與井蛙何異身死旋滅非不幸也蜀鑑卷一

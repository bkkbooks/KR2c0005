body:
  text: 蜀鑑卷七宋郭允蹈撰唐明皇幸蜀唐𤣥宗天寶十五載帝出奔蜀安祿山反哥舒翰敗績賊遂入關楊國忠首倡幸蜀之策上然之乃御勤政樓下制云欲親征聞者皆莫之信既夕命陳𤣥禮整比六軍厚賜錢帛選間廏馬九百餘匹黎明上獨與貴妃姊妹皇子妃主皇孫楊國忠韋見素魏方進陳𤣥禮及親近宦官宫人出延秋門妃主皇孫之在外者皆委之而去次于馬嵬楊國忠及貴妃楊氏伏誅帝發馬嵬留太子東討賊馬嵬驛在興平二十二里帝至扶風上至扶風士卒流言不遜㑹成都貢春綿十餘萬匹至上命陳之於庭召將士諭之曰朕衰老託任非人卿等從朕倉卒不得别父母妻子逺涉至此勞苦至矣朕甚愧之蜀路阻長郡縣褊小人馬衆多或不能供今聽卿等各還家朕獨與子孫中宫前行入蜀亦自足逹衆皆哭曰臣等以死從陛下不敢有二扶風改為鳯翔郡帝至散關分扈從將士為六軍使頴王璬先行詣劎南壽王瑁等分將六軍以次之帝至河池郡劎南節度使崔圓奉表迎車駕具陳蜀土豐稔帝至普安房琯謁見以琯同平章事普安今隆慶府太子即位於靈武上皇至成都江淮奏請貢獻之蜀之靈武者皆自襄陽取上津路抵扶風至德二載上遣太子太師韋見素入蜀奉迎上皇冬十月上皇發蜀郡上皇至鳯翔上皇命悉以甲兵輸郡庫上發精騎三千奉迎十二月丙午上皇至咸陽論曰蜀蕞爾一隅耳漢髙帝以布衣特起項羽王之漢中焚絶棧道示無還意矣徘徊南鄭鬱鬱不欲久居明皇以英武之姿乃沉溺宴安召禍致冦不復堅守京師狼狽奔蜀使非李郭諸人輔肅宗以歸關中唐之宗社亦岌岌矣哉厥後德宗至興元而遽反中和之駕留蜀者三年朱溫遂以篡唐唐人謂神堯以一旅取天下而後世不能以天下取河北夫豈知河北之失又基於明皇之棄京師而走蜀歟髙崇文討劉闢順宗永正元年劎南西川支度副使劉闢自為留後節度使韋臯薨闢久佐臯幕自為留後使諸將表求節鉞朝廷不許以袁滋為西川節度使徴闢為給事中闢不受徴阻兵自守袁滋畏其强不敢進上怒貶滋吉州刺史以闢為西川節度副使知節度事憲宗以初嗣位未能討也諫議大夫韋丹上疏以為釋闢不誅則朝廷可以指臂而使者惟兩京耳此外誰不為叛上善其言以丹為東川節度使闢既得旌節志益驕求兼領三山上不許劉闢圍東川節度使李康於梓州憲宗元和元年以神䇿軍使髙崇文將前軍兵馬李元奕將次軍山南西道節度使嚴礪討闢髙崇文出斜谷李元奕出駱谷上欲討闢而重於用兵公卿議者亦以為蜀險固難取杜黃裳獨曰闢狂戅書生取之如拾芥耳臣知神䇿軍將髙崇文勇略可用願陛下專以軍事委之勿置監軍闢必可擒乃命髙崇文將五千李元奕將二千與嚴礪同討闢髙崇文屯長武城練卒五千常如寇至卯時受詔辰時即行器械糗糧一無所闕崇文軍至興元軍士有折人筋者崇文斬之以狥劉闢陷梓州執李康嚴礪拔劒州斬其刺史文德昭闢據劒閣以抗王師髙崇文入屯梓州斬李康以崇文為東川節度使崇文引兵自閬州趨梓州闢歸李康於崇文以求自雪崇文以康敗軍失守斬之嚴礪奏克梓州制削奪闢官爵韋丹至漢中表言崇文客軍逺鬬無所資若與梓州綴其士心必能有功以崇文為東川節度使劉闢城鹿頭關髙崇文擊敗之又破闢於漢州嚴礪將嚴秦破闢衆萬餘人於石碑谷闢城鹿頭關連八栅屯兵萬餘人以拒崇文崇文擊敗之闢置栅於關東萬勝堆崇文遣將髙霞寓攻奪之崇文又破闢於德陽又破之於漢州嚴秦破闢衆萬餘人於綿州石碑谷鹿頭關在漢州德陽縣萬勝堆未詳髙崇文破劉闢衆萬人於𤣥武詔凡西川繼援之兵悉取崇文處分𤣥武今潼川府中江縣髙崇文又敗劉闢於鹿頭關嚴秦敗劉闢之衆於神泉於是闢綿江栅將李文恱鹿頭守將仇良輔皆以城降於崇文士卒降者萬計髙崇文克成都擒闢檻送京師伏誅崇文直指成都克之劉闢西奔吐蕃崇文使髙霞寓等追之及於羊灌田闢赴江不死擒之盧文若先殺妻子乃繫石自沉檻送京師斬之以髙崇文為西川節度使嚴礪為東川節度使杜黃裳建議征蜀及指授髙崇文方略皆合事宜於是始用兵討蜀以至威行兩河皆黃裳啓之也論曰河北連衡屢拒朝命地險勢强誠未易支也區區之蜀豈得與之為比唐都關中蜀近在户限之外徒以貞元姑息吐蕃陸梁韋臯得以久任者二十餘年劉闢一狂生遽欲踵臯之轍自為留後此而不討何以為國憲宗任杜黃裳為相天誅一加而威行兩河偉哉唐僖宗幸蜀唐僖宗廣明元年黃巢入長安上走興元黃巢趨長安既入城田令孜帥神䇿兵五百奉帝自金光門出惟福穆澤壽四王及妃嬪數人從行百官皆莫之知晡時賊前鋒入長安金吾將軍張直方帥文武數十人迎於霸上上趨駱谷鳯翔節度使鄭畋謁於道次請留鳯翔上曰朕不欲密邇巨冦且幸興元徴兵以圖救復卿可紏合鄰道勉建大勳上至壻水詔陳敬瑄諭以京城不守且幸興元若賊勢猶盛將幸成都宜豫為備擬帝至興元詔諸道出兵收復京師中和元年春正月發興元至成都陳敬瑄迎謁於鹿頭關至綿州東川節度使楊師立謁見鄭畋遣其子凝績詣行在凝績追及上於漢州車駕至成都館於府舍鄭畋傳檄天下合兵討賊時天子在蜀詔令不通天下謂朝廷不能復振及得畋檄爭發兵應之西川黃頭軍作亂討平之黃頭軍使郭琪帥所部作亂命諸軍擊之琪夜突圍出奔廣陵殺左拾遺孟昭圖田令孜用事昭圖上言曰天下者髙祖太宗之天下非北司之天下天子者四海九州之天子非北司之天子北司未必盡可信南司未必盡無用疏入令孜屏不奏矯詔貶昭圖嘉州司户遣人沉於蟇頥津聞者氣塞而莫敢言蟇頥津在眉州眉山縣中和二年卭州牙官阡能作亂押牙髙仁厚討平之陳敬瑄鎮西川多遣人歷縣鎮詗事謂之尋事多所求取有二人過資陽鎮獨無所求鎮將謝𢎞讓邀之不至自疑有罪夜亡入羣盜中而實無罪也捕盜使楊遷誘而執之以求功敬瑄不之問釘於西城煎油潑之備極慘酷卭州牙官阡能因公事違期亡命遷復誘之能方出首聞𢎞讓之寃發憤為盜踰月衆至萬人州縣不能制敬瑄遣楊行遷將兵數千人討之官軍與戰不利恐獲罪多執村民為俘日數十百人敬瑄不問悉斬之其中亦有老弱婦人或問之皆曰我方治田績麻官軍忽入村繫虜以來竟不知何罪蜀人羅渾擎句胡僧羅夫子韓求皆聚衆以應之阡能入蜀州境陳敬瑄以押牙髙仁厚為都招討指揮使往伐之未發前一日執阡能之諜者仁厚溫言問之皆曰某村民阡能囚某父母妻子而曰汝詗事得實則免汝家不然皆死某非願爾也仁厚曰誠如是我何忍殺汝汝歸但語阡能云髙尚書來日發所將止五百人無多兵也然我活汝一家汝為我潜語寨中人云僕射閔汝曹皆良人為賊所制使尚書求汝汝若投兵迎降當書汝背為歸順字遣汝復舊業所欲誅者阡能等五人耳諜曰此皆百姓心上事尚書盡知而赦之其誰不聽命遂遣之明日引兵發至雙流周視槧柵怒曰重復牢密如此宜其可以安眠飽食養冦邀功將斬之監軍力救僅免命悉平槧栅賊伏兵千人於野橋箐以邀官軍仁厚詗知之引兵圍之下令勿殺遣人釋戎服入賊中告諭賊大喜爭棄甲兵請降仁厚悉撫諭之書其背使歸寨中餘衆爭出降渾擎走其衆執之以來仁厚謂降者始欲即遣汝歸為前諸寨未知吾心或有憂疑藉汝曹為我前行過諸寨示以背字告喻之乃取渾擎旗倒繫之每五十人授以一旗使前走曰羅渾擎已擒大軍行至汝曹速如我出降立得為良人無事矣至穿口新津延貢寨中皆爭出降執句胡僧斬韓求羅夫子奔阡能寨與之謀悉衆决戰未定執旗先驅者至能欲出兵衆皆不應明旦諸寨呼譟爭出羅夫子自剄衆挈其首縛阡能驅之前迎官軍見仁厚擁馬首大呼泣拜曰百姓負寃日久無所控訴諜者還百姓引領度頃刻如朞年今遇尚書如出九泉睹白日已死而復生矣賊寨在他所者分遣諸將往降之仁厚出軍凡六日五賊悉平敬瑄梟二首於市釘阡能羅渾擎句胡僧而咼之阡能孔目官張榮屢舉進士不中第歸於能為之謀主仁厚送府釘於馬市自餘不戮一人敬瑄榜卭州賊黨皆釋不問未幾卭州刺史申捕獲阡能叔父行全家請凖法敬瑄以聞孔目官唐溪對曰公已榜勿問而刺史復捕之此必有故今若殺之豈非使明公失大信竊恐阡能之黨紛紛復起矣敬瑄從之因問其故果行全有良田刺史欲買之不與故陷之耳敬瑄召刺史將按之刺史以憂死他日行全密餉溪金百兩溪怒曰此乃太師仁明何預吾事汝乃懷禍相餉乎還其金斥逐使去胡氏曰唐溪明足以昭姦智足以守信亷足以提身若使處敬瑄之位阡能韓秀升楊師立之禍無自起矣由是觀之自古衰世人才之易地者豈特一唐溪哉經世之人所以汲汲於求賢惟恐不聞良有以也涪州刺史韓秀升反髙仁厚討平之涪州刺史韓秀升等聚衆冦江淮貢賦斷絶雲安淯井路不通乏鹽敬瑄乃奏以髙仁厚為行軍司馬將兵三千以討平之雲安今𨽻䕫州淯井今長寧軍中和四年東川節度使楊師立舉兵反詔以髙仁厚為留後將兵討平之以仁厚為東川節度使髙仁厚之討韓秀升也陳敬瑄語之曰成功而還當以東川相賞師立聞之怒舉兵反詔仁厚討之仁厚屯德陽師立遣其將鄭君雄據鹿頭以拒之堅壁不出仁厚列寨圍之夜二鼓君雄等出徑兵掩擊城北副使寨楊茂言不能禦帥衆走諸寨聞之皆走茂言走至張杷追及之詰旦仁厚斬以狥仁厚圍梓州久不下乃為書射城中遺其將士曰仁厚不忍城中玉石俱焚為諸君緩師十日使諸君自成其功數日鄭君雄斬師立出降詔以仁厚為東川節度使張杷在潼川府光啓元年車駕發成都三月至京師光啓二年陳敬瑄殺東川節度使髙仁厚敬瑄疑仁厚欲去之㑹遂州刺史鄭君立起兵陷成都敬瑄遣其將李順之逆戰君立敗死敬瑄又發維茂羌軍擊仁厚殺之司馬公考異云張􅒷耆舊傳不言仁厚所終惟數敬瑄六錯云太師殺髙仁厚一錯髙僕射權謀智勇纍有大功於太師又極忠孝若在王司徒不過梓潼司徒謂王建也論曰僖宗之幸蜀歷三年之久而叛者亦三起非一髙仁厚為之掃平則雖區區之蜀不容以一朝居也愚觀仁厚忠誠智略雖古名將何以加諸嗚呼世運雖衰而天之生才也未嘗乏當僖宗之時有鄭畋以為相有仁厚以為將使二子得伸其志而敬瑄令孜不遂其姦則唐宗未至於不可支也觀仁厚之平阡能等吐露心腹於蚩蚩之氓而至於不戮一人亦可謂忠厚之至矣議者謂蜀民喜亂不為過乎彼唐溪卭州一孔目官耳其明智與廉為後世君子之所樂道而髙仁厚之忠厚卓卓如此宋景文公乃略其事謂其不可與事天子惜夫王建據蜀唐僖宗光啓三年利州刺史王建襲據閬州山南節度使楊守亮忌王建驍勇屢召之建懼不往周庠說建曰唐祚將終立大功者非公而誰然葭萌四戰之地難以久安閬州地僻人富刺史楊茂實不修職貢若表其罪興兵討之可一戰而擒也建從之召募溪洞酋豪有衆八千沿嘉陵江而下襲閬州逐茂實自稱防禦使軍勢益盛王建攻成都不克退保漢州西川陳敬瑄懼王建與東川顧彥朗合謀圖已田令孜曰建吾子也今折簡召之可致麾下遣使召之建大喜帥精騎至鹿頭關敬瑄悔遣人止之建怒破關而進敗漢州刺史張頊於綿遂拔漢州進軍學射山又敗西川將句維立於蠶此又拔德陽顧彥朗以其弟彥暉為漢州刺史發兵助建急攻成都三日不克而退還屯漢州學射山在成都蠶此屬新繁縣文德元年王建攻彭山陳敬瑄救之而去以韋昭度為西川節度使兼兩川招撫使王建表請討陳敬瑄以贖罪因求卭州顧彥朗亦請赦建罪移敬瑄他鎮以靖兩川上素惡田令孜憤藩鎮跋扈㑹得彥朗建表以令孜所恃者敬瑄耳以韋昭度鎮西川楊守亮副之王建軍新都綿竹土豪何義陽安仁費師勤等擁兵自保皆附於建以王建為永平軍節度使治卭州割卭蜀黎雅置永平軍以建為節度使削奪陳敬瑄官爵昭宗大順元年王建攻卭州拔之簡資嘉戎四州皆降又取蜀州大順二年詔顧彥朗王建罷兵王建逐韋昭度還攻成都周庠勸建請韋公還朝獨攻成都克而有之建從之臠其親吏昭度大懼以印節授建即日東還建送之出劒門即以兵守之不復內東軍急攻成都環城烽塹亘五十里王建克成都自稱西川留後以王建為西川節度使田令孜以印節詣建陳敬瑄開門納之建遂自稱成都留後徙敬瑄居新津以縣租賦給之景福元年王建圍彭州陳敬瑄以其將楊晟守彭州王建圍彭州踰年久不下民皆竄匿山谷諸寨日出俘掠有軍士王先成者新津人本書生也世亂為兵度諸將惟王宗侃最賢往說之曰彭州本西川之巡屬也陳田以授楊晟使拒朝命今陳田已平而晟猶據之州民皆知四川大府而司徒其主也故大軍始至民皆入山谷以俟招安今軍士掠之而司徒不恤彼將更思楊氏矣宗侃惻然不覺屢移其狀前問之先成曰又有甚於此者今諸寨旦出淘虜薄暮乃返曽無守備之意城中萬一有智者為之畫䇿伏兵門內俟淘虜者稍逺便出奮擊又於三面城下各出耀兵諸寨咸自備禦無暇相救能無敗乎宗侃矍然曰此誠有之將若之何先成請條列為狀以白王建凡七條一乞招安山中百姓二乞禁諸寨淘虜三乞置招安寨選部將謹幹者執兵巡衛四乞招安之事願降帖付宗侃專掌五乞悉索所虜彭州百姓集於營場有父子兄弟夫婦自相認者即便送招安寨敢匿者斬六乞置九隴行縣於招安寨中撫理百姓給牒入山招其親戚七乞彭土冝麻民未入山多漚藏者冝令縣令曉諭各歸田里出而鬻之以為資糧必漸復業建得之大喜即行之三日民出山赴寨如歸市久之見村落無抄暴稍辭縣令復其故業月餘招安寨皆空胡氏曰古人所以廣取士之路者為賢才難知恐其遺也取之廣然後賢才不在下而皆在上則下受其賜而亂無自起矣王茂先走卒也王建得之遂不用兵而下一州然則人才之隱伏于塵土草茅可勝計哉是冝表而用之俾盡見其所長而建不能冝所就之狹劣也論曰昔先正吕汲公之叙華陽國志也其言曰自先漢至晉初踰四百嵗士女可書者四百人可謂衆矣復自晉初至于周顯德僅七百嵗而史所書無幾人忠魂義骨與逰塵野馬同沒于邱原者多矣觀唐溪卭州一孔目官王先成彭州一軍士而致堂胡氏拳拳豫而進之也如此蜀文才遺逸之久如汲公之言真可惜也鳳翔節度使李茂真取興元楊守亮奔閬州宦者楊復恭奔興元與山南節度使楊守亮拒王命茂真討之遂取興元守亮等奔閬州茂真表其子繼密知興元府事遂有漢中之地王建遣兵擊楊守亮於閬州破之大順二年王建殺陳敬瑄田令孜建請於朝不許遂殺之乾寧元年王建克彭州殺楊晟建克彭州楊晟猶帥衆力戰刀子都虞侯王茂權斬之獲其馬步使安師建建欲使為將帥建泣謝曰誓與楊司徒同生死不忍復戴日月再三諭之不從乃殺之禮葬而祭之晟今有廟在彭州後圃乾寧三年荆南將許存降於王建更名宗播荆南節度使成汭遣存泝江略地以存為萬州刺史存遂降於建乾寧四年王建遣王宗侃攻渝州王宗阮攻瀘州取之宗侃取渝州降刺史牟宗厚宗阮拔瀘州斬刺今馬敬儒峽路通王建遣華洪攻東川王宗謹敗鳳翔將李繼徽等於𤣥武顧彥暉代其兄彥朗為節度使楊守亮嘗攻之求救於王建建嘗遣華洪救彥暉因而執之彥暉覺其謀至是彭州既平建乃謀東川𤣥武今中江縣鳳翔將李繼昭救東川留偏將守劒門王宗播擊擒之王建自將攻東川克之顧彥暉自殺以張琳守成都更華洪姓名曰王崇滌朝廷遣使和解兩川遇建於張杷塞建指執旗者曰戰士之情不可奪也建與彥暉五十餘戰遂圍梓州用蜀州刺史周德權䇿遣使諭以外無救援彥暉勢益孤知遂州侯紹知合州王仁威鳳翔將李繼溥皆以援兵降於王建建攻益急彥暉自殺城兵尚七萬人命王宗綰分兵狥昌普等州以王宗滌為東川留後彥暉兄弟有廟在潼川府子城論曰王建以盜賊之質乘陳敬瑄田令孜斗筲盜竊之時遂假王命以逐元帥楊晟顧彥暉獨攖其鋒以死拒之然晟蓋敬瑄之黨而彥暉亦欲為建者非果忠於唐也以區區之蜀連兵蹀血數年乃定其禍也慘矣二州之人尸而祝之不亦異乎天復二年王建取利州西川兵至利州李繼忠棄鎮奔鳳翔王建以王宗偉守之王建取興元西川軍至興元李繼密戍三泉以拒之王宗播遂破金牛黑水西縣褒城西寨王宗綰破馬盤寨繼密戰敗奔還漢中西川軍遂乘勝至城下王宗滌帥衆先登遂克之繼密請降遷於成都得兵三萬騎五千詔以王宗滌鎮之宗滌有勇略得衆心王建忌之遂殺之以王宗賀權興元留後三泉今大安軍金牛黑水西縣褒城馬盤並在今興元府王建取洋州興州李思敬以洋州降於建建攻拔興州以王宗浩為興州刺史天復三年王建出攻秦隴遣判官韋莊入貢建亦修好於朱全忠全忠遣押牙王殷報聘殷言蜀甲兵誠多但乏馬耳建作色曰當道江山險阻騎兵無所施然馬亦不乏乃集諸州馬大閲於星宿山官馬八千私馬四千部隊甚整殷嘆服建本騎將故得蜀之後於文維黎茂州市邊馬十年之間遂及兹數進王建爵蜀王王建取䕫忠萬施四州屯軍䕫州王宗本兵至䕫州刺史侯矩以城降宗本遂定䕫忠萬施四州建復以矩為䕫州刺史更姓名曰王宗矩蜀之議者以瞿唐蜀之險要乃棄歸峽屯軍䕫州王建自光啓三年丁未據閬州反至天復三年癸亥凡十七年然後取䕫門盡有蜀地天祐元年王建遣兵迎車駕朱全忠劫上幸洛陽上遣間使以御札告難于王建建遣王宗祐將兵㑹鳳翔至興平遇汴兵不得進建始自用墨制除官五月趙匡凝攻䕫州不克匡凝鎮荆南遣水軍上峽攻䕫州知渝州王宗阮擊敗之萬州刺史張武作鐵絙絶江中流立栅於兩端謂之鎖峽王建與鳳翔李茂貞連和合兵討朱全忠馮涓言於建曰梁唐虎爭勢不兩立若併而為一舉兵得蜀雖諸葛復生不能敵矣鳳翔蜀之藩籬不若與之和親無事則務農訓兵有事則觀釁而動可以萬全建曰善乃與茂貞修好天祐二年王建取金州馮行襲復取之行襲奏金州荒殘乞徙理均州從之後數年桑𢎞志又克之天祐四年王建稱帝岐蜀交爭蜀永平元年岐攻興元唐道襲擊禦之梁以僣號唐已亡矣今係以蜀岐王使劉知俊李繼崇將兵擊蜀王宗侃等與戰於青泥嶺蜀兵大敗王宗浩奔興州道襲奔興元先是王宗綰城西縣號安逺軍宗侃宗賀等收散兵卒保之知俊繼崇追圍之衆議欲棄興元道襲曰無興元則無安逺利州遂為敵境矣吾必以死守之王宗播將兵救安逺軍壁於亷讓之間與唐道襲合擊岐兵大破之於明珠曲明日又戰於鳬口斬其成州刺史李彥琛青泥嶺在沔州長舉縣西縣屬興元王建置安逺軍亷讓二水名南齊梁州記范柏年因出謁宋明帝言及廣州貪泉因謂曰卿州復有此否答曰梁州惟有文川武鄉亷泉讓水曰卿宅何在曰在亷讓間明珠曲未詳鳬口鳬谷水口也在今興元府亷水縣蜀主自將擊岐兵大破之蜀主如利州命彭君集破岐二寨王宗侃在安逺遣人自中巴間行至泥溪見蜀主告急蜀主命王宗弼救安逺宗弼及劉知俊戰於斜谷破之宗弼敗岐兵於金牛拔十六寨俘斬六千餘級王宗播敗岐兵於黃牛川蜀主自利州如興元安逺軍望其旗王宗侃等鼓譟而出與援軍夾攻岐兵大破之拔二十一寨岐兵解圍遁去金牛屬大安軍黃牛川在南鄭縣黃牛山下中巴在今巴州泥溪在利州西南今米倉山間道也蜀永平二年王宗汾攻岐文州拔之永平四年蜀攻岐階州破長城關永平五年蜀遣兵攻岐克階成秦鳳州蜀遣王宗播攻秦州王宗瑶攻鳳州王宗翰引兵出青泥嶺克固鎮與秦州將郭守謙戰於泥陽川蜀兵敗退保鹿臺山王宗綰等敗秦州兵於金沙谷乘勝趨秦州王宗鐸克階州王宗綰克成州蜀軍至上染坊秦州節度使李繼崇奉牌印迎降王宗綰自河池兩當㑹王宗瑶攻鳳州克之泥陽水北出泥谷上染坊屬天水入􅀢郊堡南通正元年蜀攻岐圍鳳翔王宗綰舉軍出大散關大破岐兵俘斬萬計遂取寶雞王宗播等出故關至隴州李繼岌棄隴州奔於蜀軍蜀軍進攻隴州㑹大雪蜀主召軍還故關在隴州隴安縣先天元年蜀主建殂太子宗衍立髙季昌攻蜀蜀王建永平四年荆南髙季昌攻䕫州不克髙季昌以蜀䕫萬忠涪四州舊𨽻荆南興兵取之先以水軍攻䕫州刺史王成先逆戰季昌縱火船焚蜀浮橋招討副使張武舉鐵絙拒之船不得進㑹風反荆南兵焚溺死者甚衆季昌乘戰艦䝉以牛革飛石中之折其尾季昌易小舟以遁荆南兵大敗俘斬五千級後唐取蜀後唐莊宗同光三年唐遣魏王繼岌及郭崇韜伐蜀李紹琛攻蜀威武城克之郭崇韜入散關紹琛攻蜀威武城指揮使唐彥思等降得城中糧二十萬斛紹琛縱其敗兵萬餘人逸去因倍道趨鳳州李嚴飛書以諭王承捷李繼曮竭鳳翔蓄積以饋軍不能充人情憂恐郭崇韜入散關指其山曰吾輩進無成功不得復還此矣今饋運將竭冝先取鳳州因其糧乃倍道而進王承捷以鳳興文扶四州降得兵八千糧四十萬斛以承捷攝武興節度使蜀主王衍東逰至利州遣王崇勳等將兵逆戰李紹琛等戰於三泉大破之蜀主至利州遇威武敗卒始信唐兵之來乃以王崇勳等為三招討將兵三萬人逆戰兵皆怨憤曰龍武軍糧賜倍於他軍他軍安能禦敵紹琛等克興州與戰三泉大敗之又得糧十五萬斛蜀主王衍西走斷桔柏津命王宗弼守利州李紹琛趨利州魏王繼岌至興州宋光葆及諸城鎮皆降蜀武德留後宋光葆以梓綿劒龍普五州王承肇以洋蓬壁三州王崇威以梁開通渠麟五州階州刺史王承嶽以階州皆降其餘城鎮皆望風款附安重霸以秦隴降王承休自文扶歸成都王承休與安重霸在秦隴謀掩擊唐軍重霸曰擊之不勝則大事去矣蜀天下險固唐兵雖勇安能直度劒門耶然公受國恩聞難不可不赴願與公俱西承休以為然重霸請賂羌人買文扶州路以歸承休使重霸將龍武軍及所募兵萬二千人以從將行州人餞於城外承休上道重霸拜於馬前曰國家竭力以得秦隴若從開府還朝誰當守之開府行矣重霸請為公留守承休無如之何遂與招討副使王宗汭自文扶西南還蜀其地皆不毛羌人抄之且戰且行士卒凍餒北至茂州餘衆二千而已重霸遂以秦隴來降寰宇記廢扶州在文州曲水縣今為鎮文州西至扶州鎮審界一百三十五里舊屬隴西道松州都督松州北至扶州三百里至吐蕃界五十五里南至茂州三百里髙季興將水軍上峽取施州尋遁去䕫忠萬三州遣使詣魏王繼岌降唐之伐蜀也亦命髙季興充招討使季興常欲取三峽畏峽路招討使張武威名至是乘唐兵勢自將水軍上峽取施州張武以鐵鎖斷江路季興遣勇士乘舟砍之㑹風大起舟絓於鎖不能進退矢石交下壞其戰艦季興輕舟遁去既而聞北路陷敗䕫忠萬三州遣使詣魏王降同光三年李紹琛入利州修桔柏浮梁魏王繼岌至劒州蜀武信節度使王宗壽以遂合渝瀘昌五州降李紹琛至綿州浮馬渡江入鹿頭關進至漢州紹琛進至綿州倉庫民居已為蜀兵所燔又斷綿江浮梁無舟楫可渡紹琛謂李嚴曰吾懸軍深入利在速戰乘蜀人破膽之時但得百騎過鹿頭關彼且迎降不暇若俟修繕橋梁必留數日或教王衍堅閉近關折吾兵勢儻延旬浹則勝負未可知矣乃與嚴乘馬浮渡江從兵得濟者僅千人溺死者六千餘人遂入鹿頭關進據漢州王宗弼差使勞軍且輸降款魏王繼岌郭崇韜李紹琛李嚴等至成都蜀主王衍出降自出師至克蜀凡七十日王宗弼王承休伏誅莊宗聞破蜀遣宦官向延嗣還上蜀簿得兵三十萬馬九千五百匹兵器七百萬糧二百五十三萬石錢一百九十二萬緡金銀二十二兩珠玉犀象二萬文錦綾羅五十萬匹莊宗曰人言蜀天下之富國也所得止於此耶延嗣因言蜀之寶貨皆入崇韜家王建自光啓三年丁未入閬州至唐同光三年乙酉蜀滅凡三十九年蜀鑑卷七
